      const next = i === seasonState.wins;
      const t = this.add.text(x, trophyY, won ? '🏆' : (next ? '➤' : '·'), {
        fontFamily:'Bebas Neue', fontSize: won ? '48px' : next ? '34px' : '34px',
        color: won ? '#ffb800' : next ? '#88ddff' : '#666'
      }).setOrigin(0.5);
      if (next) this.tweens.add({ targets: t, scale: 1.2, duration: 700, yoyo: true, repeat: -1, ease:'Sine.inOut' });
    }

    // Next opponent panel
    const opp = OPPONENT_TEAMS[Math.min(seasonState.wins, OPPONENT_TEAMS.length - 1)];
    const panel = this.add.graphics();
    panel.fillStyle(0x0d1320, 0.92); panel.fillRoundedRect(W/2 - 360, 280, 720, 320, 16);
    panel.lineStyle(3, 0xffb800, 0.8); panel.strokeRoundedRect(W/2 - 360, 280, 720, 320, 16);
    this.add.text(W/2, 320, 'NEXT OPPONENT', { fontFamily:'Oswald', fontSize:'18px', color:'#aaa', letterSpacing:6 }).setOrigin(0.5);
    this.add.text(W/2, 370, opp.name.toUpperCase(), { fontFamily:'Bebas Neue', fontSize:'68px', color:'#fff', stroke:'#000', strokeThickness:5, letterSpacing:6 }).setOrigin(0.5);
    this.add.text(W/2, 440, '⭐'.repeat(opp.tier), { fontFamily:'Bebas Neue', fontSize:'34px', color:'#ffb800' }).setOrigin(0.5);
    this.add.text(W/2, 510, opp.flavor, { fontFamily:'Oswald', fontSize:'20px', color:'#e8e8e0', align:'center', wordWrap:{ width: 660 }, fontStyle:'italic' }).setOrigin(0.5);

    // Roster summary
    const offCount = seasonState.roster.filter(c => c.side==='off').length;
    const defCount = seasonState.roster.filter(c => c.side==='def').length;
    this.add.text(W/2, 660, `Roster: ${offCount} OFF · ${defCount} DEF`, { fontFamily:'Oswald', fontSize:'20px', color:'#88ddff', letterSpacing:2 }).setOrigin(0.5);

    // PLAY MATCH
    makeAssetButton(this, W/2, H - 280, 'PLAY MATCH', 'btn_snap', '#fff', () => {
      sfx('click'); this.cameras.main.fadeOut(400);
      this.time.delayedCall(400, () => {
        const aiDeck = buildAIDeck(opp.tier);
        newGame(seasonState.roster, aiDeck, 'season', opp);
        this.scene.start('GameScene');
      });
    }, { w: 380 });
    makeAssetButton(this, W/2 - 130, H - 160, 'VIEW ROSTER', 'btn_concede', '#fff', () => {
      sfx('click'); this.scene.start('RosterScene');
    }, { w: 240, fontSize: 28 });
    makeAssetButton(this, W/2 + 130, H - 160, 'MAIN MENU', 'btn_concede', '#fff', () => {
      sfx('click'); this.cameras.main.fadeOut(300);
      this.time.delayedCall(300, () => this.scene.start('MenuScene'));
    }, { w: 240, fontSize: 28 });
  }
}

// ============================================================
// SCENE: ROSTER (Phase 5)
// ============================================================
class RosterScene extends Phaser.Scene {
  constructor() { super({ key:'RosterScene' }); }
  create() {
    const W = this.scale.width, H = this.scale.height;
    this.cameras.main.fadeIn(300);
    if (!seasonState) seasonState = loadSeason();
    if (!seasonState) { this.scene.start('MenuScene'); return; }

    const vg = this.add.graphics(); vg.fillStyle(0x050810, 1); vg.fillRect(0,0,W,H);

    this.add.text(W/2, 60, 'ROSTER', { fontFamily:'Bebas Neue', fontSize:'56px', color:'#ffb800', stroke:'#000', strokeThickness:5, letterSpacing:6 }).setOrigin(0.5);
    this.add.text(W/2, 110, `${seasonState.roster.length} cards`, { fontFamily:'Oswald', fontSize:'18px', color:'#aaa', letterSpacing:2 }).setOrigin(0.5);

    // Sorted list — OFF then DEF, by cost
    const sorted = [...seasonState.roster].sort((a, b) => {
      if (a.side !== b.side) return a.side === 'off' ? -1 : 1;
      return a.cost - b.cost;
    });
    // Two columns scrollable container
    const listCont = this.add.container(0, 0);
    const cardW = 140;
    const cardH = cardW * 1.4;
    const cols = 5;
    const gap = 10;
    const startX = (W - (cols * cardW + (cols - 1) * gap)) / 2 + cardW/2;
    sorted.forEach((c, i) => {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const x = startX + col * (cardW + gap);
      const y = 180 + row * (cardH + gap);
      const cc = buildCard(this, c, cardW);
      cc.x = x; cc.y = y;
      cc.setSize(cardW, cardH).setInteractive({ useHandCursor: true });
      cc.on('pointerup', () => this.showInspect(c));
      listCont.add(cc);
    });
    // Scroll via drag (mobile)
    let dragStart = null;
    this.input.on('pointerdown', (p) => { dragStart = { y: p.y, contY: listCont.y }; });
    this.input.on('pointermove', (p) => {
      if (!dragStart || !p.isDown) return;
      listCont.y = dragStart.contY + (p.y - dragStart.y);
      const totalRows = Math.ceil(sorted.length / cols);
      const maxScroll = Math.max(0, totalRows * (cardH + gap) - (H - 280));
      if (listCont.y > 0) listCont.y = 0;
      if (listCont.y < -maxScroll) listCont.y = -maxScroll;
    });
    this.input.on('pointerup', () => { dragStart = null; });

    makeAssetButton(this, W/2, H - 60, 'BACK', 'btn_concede', '#fff', () => {
      sfx('click'); this.scene.start('SeasonHubScene');
    }, { w: 320, fontSize: 32 });
  }

  showInspect(card) {
    const W = this.scale.width, H = this.scale.height;
    const cont = this.add.container(W/2, H/2).setDepth(9000);
    const dim = this.add.graphics(); dim.fillStyle(0x000000, 0.85); dim.fillRect(-W/2, -H/2, W, H);
    cont.add(dim);
    dim.setInteractive(new Phaser.Geom.Rectangle(-W/2, -H/2, W, H), Phaser.Geom.Rectangle.Contains);
    dim.on('pointerup', () => cont.destroy());
    const big = buildCard(this, card, 360);
    big.x = 0; big.y = -100; cont.add(big);
    if (card.ability) {
      cont.add(this.add.text(0, 200, card.ability, { fontFamily:'Oswald', fontSize:'24px', color:'#ffb800', stroke:'#000', strokeThickness:3, align:'center', wordWrap:{ width: 600 } }).setOrigin(0.5));
    }
    cont.add(this.add.text(0, 260, `${card.pos} · ${card.team} · ${card.rarity.toUpperCase()}`, { fontFamily:'Oswald', fontSize:'20px', color:'#aaa', letterSpacing:2 }).setOrigin(0.5));
  }
}

// ============================================================
// SCENE: MATCH SUMMARY (Phase 6)
// Sequenced reveal: result → score → XP tick → cash tick → breakdown
// → XP bar fill (with level-ups) → perk-unlock banner → CONTINUE
// ============================================================
class MatchSummaryScene extends Phaser.Scene {
  constructor() { super({ key:'MatchSummaryScene' }); }
  init(data) {
    this.matchResult = data.matchResult;
    this.rewards = data.rewards;
    this.levelInfo = data.levelInfo;
    this.seasonOngoing = !!data.seasonOngoing;
    this.championship = !!data.championship;
  }

  create() {
    this.W = this.scale.width; this.H = this.scale.height;
    this.reduced = prefersReducedMotion();
    this.cameras.main.fadeIn(300);
    const bg = this.add.image(this.W/2, this.H/2, 'stadium_bg');
    const bgTex = this.textures.get('stadium_bg').source[0];
    bg.setScale(Math.max(this.W / bgTex.width, this.H / bgTex.height)).setAlpha(0.4);
    const vg = this.add.graphics(); vg.fillStyle(0x050810, 0.85); vg.fillRect(0,0,this.W,this.H);

    const won = this.matchResult.won;
    const tie = this.matchResult.finalScore.you === this.matchResult.finalScore.ai;
    const label = won ? 'VICTORY' : tie ? 'TIE GAME' : 'DEFEAT';
    const color = won ? '#4aff8a' : tie ? '#ffb800' : '#ff5a5a';

    // Result banner
    this.resultTxt = this.add.text(this.W/2, 140, label, {
      fontFamily:'Bebas Neue', fontSize:'120px', color, stroke:'#000', strokeThickness:10, letterSpacing:8
    }).setOrigin(0.5).setAlpha(0).setScale(0.5);

    // Championship banner
    if (this.championship) {
      this.champTxt = this.add.text(this.W/2, 60, '🏆 CHAMPIONS! 🏆', {
        fontFamily:'Bebas Neue', fontSize:'40px', color:'#ffb800', stroke:'#000', strokeThickness:5, letterSpacing:6
      }).setOrigin(0.5).setAlpha(0);
    }

    this.scoreTxt = this.add.text(this.W/2, 260, `YOU ${this.matchResult.finalScore.you}  —  ${this.matchResult.finalScore.ai}  CPU`, {
      fontFamily:'Bebas Neue', fontSize:'56px', color:'#fff', stroke:'#000', strokeThickness:7, letterSpacing:6
    }).setOrigin(0.5).setAlpha(0);

    this.opponentTxt = this.add.text(this.W/2, 320, this.matchResult.opponent ? 'vs. ' + this.matchResult.opponent.name : 'QUICK PLAY', {
      fontFamily:'Oswald', fontSize:'24px', color:'#aaa', letterSpacing:4
    }).setOrigin(0.5).setAlpha(0);

    // XP row
    this.xpRow = this.add.container(this.W/2, 410).setAlpha(0);
    const xpLbl = this.add.text(-140, 0, 'XP EARNED', { fontFamily:'Oswald', fontSize:'24px', color:'#88ddff', letterSpacing:3 }).setOrigin(0, 0.5);
    this.xpVal = this.add.text(140, 0, '+0', { fontFamily:'Bebas Neue', fontSize:'42px', color:'#fff', stroke:'#000', strokeThickness:4 }).setOrigin(1, 0.5);
    this.xpRow.add([xpLbl, this.xpVal]);

    this.cashRow = this.add.container(this.W/2, 470).setAlpha(0);
    const cashLbl = this.add.text(-140, 0, 'CASH EARNED', { fontFamily:'Oswald', fontSize:'24px', color:'#4aff8a', letterSpacing:3 }).setOrigin(0, 0.5);
    this.cashVal = this.add.text(140, 0, '+$0', { fontFamily:'Bebas Neue', fontSize:'42px', color:'#fff', stroke:'#000', strokeThickness:4 }).setOrigin(1, 0.5);
    this.cashRow.add([cashLbl, this.cashVal]);

    // Breakdown
    this.breakdownCont = this.add.container(this.W/2, 560);

    // XP bar / level
    this.levelTxt = this.add.text(this.W/2 - 200, 920, 'LV ' + this.levelInfo.startLevel, { fontFamily:'Bebas Neue', fontSize:'36px', color:'#ffb800', stroke:'#000', strokeThickness:4 }).setOrigin(0, 0.5);
    this.nextPerkTxt = this.add.text(this.W/2 + 200, 920, '', { fontFamily:'Oswald', fontSize:'16px', color:'#88ddff', letterSpacing:2 }).setOrigin(1, 0.5);
    this.updateNextPerkHint(this.levelInfo.startLevel);

    this.xpBarBg = this.add.graphics();
    this.xpBarBg.fillStyle(0x222633, 1); this.xpBarBg.fillRoundedRect(this.W/2 - 280, 950, 560, 32, 8);
    this.xpBarBg.lineStyle(2, 0xffb800, 0.6); this.xpBarBg.strokeRoundedRect(this.W/2 - 280, 950, 560, 32, 8);
    this.xpBarFill = this.add.graphics();
    this.xpBarText = this.add.text(this.W/2, 966, '', { fontFamily:'JetBrains Mono', fontSize:'18px', color:'#fff', stroke:'#000', strokeThickness:3 }).setOrigin(0.5);
    this.setXpBarPercent(this.levelInfo.startXp / this.levelInfo.startXpForNext);
    this.xpBarText.setText(this.levelInfo.startXp + ' / ' + this.levelInfo.startXpForNext);

    // Perk-unlock banner placeholder
    this.perkBanner = this.add.container(this.W/2, 1080).setAlpha(0);
    this.perkBannerBg = this.add.graphics();
    this.perkBannerBg.fillStyle(0xffb800, 0.95); this.perkBannerBg.fillRoundedRect(-280, -50, 560, 100, 12);
    this.perkBanner.add(this.perkBannerBg);
    this.perkBannerTxt = this.add.text(0, 0, '', { fontFamily:'Bebas Neue', fontSize:'28px', color:'#000', align:'center', wordWrap:{ width: 540 } }).setOrigin(0.5);
    this.perkBanner.add(this.perkBannerTxt);

    // Continue button
    this.continueBtn = makeAssetButton(this, this.W/2, this.H - 120, 'CONTINUE', 'btn_snap', '#fff', () => this.onContinue(), { w: 380 });
    this.continueBtn.setAlpha(0);

    this.runSequence();
  }

  setXpBarPercent(pct) {
    pct = Math.max(0, Math.min(1, pct));
    this.xpBarFill.clear();
    this.xpBarFill.fillStyle(0xffb800, 1);
    this.xpBarFill.fillRoundedRect(this.W/2 - 280, 950, 560 * pct, 32, 8);
  }

  updateNextPerkHint(currentLevel) {
    const nextPerk = PERK_POOL.find(p => p.unlockLevel > currentLevel);
    if (nextPerk) this.nextPerkTxt.setText('Next: ' + nextPerk.icon + ' ' + nextPerk.name + ' (Lv ' + nextPerk.unlockLevel + ')');
    else this.nextPerkTxt.setText(currentLevel >= COACH_LEVEL_CAP ? 'MAX LEVEL' : 'All perks unlocked');
  }

  async runSequence() {
    const r = this.reduced;
    await this.delay(r ? 10 : 100);
    this.tweens.add({ targets: this.resultTxt, alpha: 1, scale: 1, duration: r ? 100 : 500, ease:'Back.out' });
    if (this.champTxt) this.tweens.add({ targets: this.champTxt, alpha: 1, duration: r ? 100 : 400, delay: 200 });
    await this.delay(r ? 100 : 500);
    this.tweens.add({ targets: [this.scoreTxt, this.opponentTxt], alpha: 1, duration: r ? 100 : 400 });
    await this.delay(r ? 100 : 500);
    // XP tick
    this.tweens.add({ targets: this.xpRow, alpha: 1, duration: r ? 80 : 300 });
    await this.tickValue(this.xpVal, 0, this.rewards.xpEarned, r ? 200 : 800, v => '+' + v);
    // Cash tick
    this.tweens.add({ targets: this.cashRow, alpha: 1, duration: r ? 80 : 300 });
    await this.tickValue(this.cashVal, 0, this.rewards.cashEarned, r ? 200 : 800, v => '+$' + v);
    // Breakdown
    for (let i=0;i<this.rewards.breakdown.length;i++) {
      const line = this.rewards.breakdown[i];
      const row = this.add.container(0, i * 36);
      const lTxt = this.add.text(-280, 0, line.label, { fontFamily:'Oswald', fontSize:'20px', color:'#e8e8e0' }).setOrigin(0, 0.5);
      const rightPieces = [];
      if (line.xp)   rightPieces.push('+' + line.xp + ' XP');
      if (line.cash) rightPieces.push('+$' + line.cash);
      const rTxt = this.add.text(280, 0, rightPieces.join('  ·  '), { fontFamily:'Oswald', fontSize:'20px', color:'#ffb800', stroke:'#000', strokeThickness:2 }).setOrigin(1, 0.5);
      row.add([lTxt, rTxt]); row.setAlpha(0);
      this.breakdownCont.add(row);
      this.tweens.add({ targets: row, alpha: 1, duration: r ? 30 : 200 });
      await this.delay(r ? 30 : 160);
    }
    await this.delay(r ? 60 : 240);
    await this.animateXpBar();
    // Perk unlock banner
    const unlocked = [...this.levelInfo.levelUps].reverse().map(l => l.perkUnlocked).find(Boolean);
    if (unlocked) {
      this.perkBannerTxt.setText('PERK UNLOCKED!\n' + unlocked.icon + ' ' + unlocked.name + ' — ' + unlocked.desc);
      this.tweens.add({ targets: this.perkBanner, alpha: 1, y: 1080, duration: r ? 100 : 400, ease:'Back.out' });
      sfx('perkUnlock');
      await this.delay(r ? 80 : 320);
    }
    this.tweens.add({ targets: this.continueBtn, alpha: 1, duration: r ? 100 : 350 });
  }

  tickValue(target, from, to, ms, fmt) {
    return new Promise(resolve => {
      if (from === to) { target.setText(fmt(to)); resolve(); return; }
      const startT = performance.now();
      let lastTick = 0;
      const step = (now) => {
        const t = Math.min(1, (now - startT) / ms);
        const val = Math.round(from + (to - from) * t);
        target.setText(fmt(val));
        if (now - lastTick > 80) { sfx('tick'); lastTick = now; }
        if (t < 1) requestAnimationFrame(step);
        else { target.setText(fmt(to)); resolve(); }
      };
      requestAnimationFrame(step);
    });
  }

  async animateXpBar() {
    let curLevel = this.levelInfo.startLevel;
    let curXp = this.levelInfo.startXp;
    let xpRemaining = this.rewards.xpEarned;
    const r = this.reduced;
    while (xpRemaining > 0 && curLevel < COACH_LEVEL_CAP) {
      const needed = xpRequiredForLevel(curLevel + 1) - curXp;
      if (xpRemaining < needed) {
        curXp += xpRemaining; xpRemaining = 0;
        const total = xpRequiredForLevel(curLevel + 1);
        this.tweenBar(curXp / total, r ? 200 : 900);
        this.xpBarText.setText(curXp + ' / ' + total);
        await this.delay(r ? 220 : 950);
      } else {
        xpRemaining -= needed;
        const total = xpRequiredForLevel(curLevel + 1);
        this.tweenBar(1, r ? 180 : 800);
        this.xpBarText.setText(total + ' / ' + total);
        await this.delay(r ? 200 : 900);
        sfx('levelUp');
        curLevel++;
        this.levelTxt.setText('LV ' + curLevel);
        this.updateNextPerkHint(curLevel);
        // Flash bar
        this.tweens.add({ targets: this.xpBarFill, alpha: 0.3, duration: 120, yoyo: true });
        await this.delay(r ? 100 : 360);
        curXp = 0;
        this.setXpBarPercent(0);
        this.xpBarText.setText('0 / ' + xpRequiredForLevel(curLevel + 1));
        await this.delay(r ? 60 : 200);
      }
    }
  }

  tweenBar(targetPct, dur) {
    const startPct = this._currentBarPct || 0;
    const obj = { v: startPct };
    this.tweens.add({ targets: obj, v: targetPct, duration: dur, ease:'Cubic.out', onUpdate: () => this.setXpBarPercent(obj.v) });
    this._currentBarPct = targetPct;
  }

  onContinue() {
    sfx('click');
    this.cameras.main.fadeOut(300);
    this.time.delayedCall(300, () => {
      if (this.matchResult.opponent && this.seasonOngoing) {
        this.scene.start('SeasonHubScene');
      } else if (this.matchResult.opponent && !this.seasonOngoing && !this.championship) {
        showToastDefer = 'BETTER LUCK NEXT TIME';
        this.scene.start('MenuScene');
      } else {
        this.scene.start('MenuScene');
      }
    });
  }

  delay(ms) { return new Promise(r => this.time.delayedCall(ms, r)); }
}
let showToastDefer = null;

// ============================================================
// SCENE: LOCKER ROOM (Phase 7)
// ============================================================
class LockerRoomScene extends Phaser.Scene {
  constructor() { super({ key:'LockerRoomScene' }); }
  create() {
    this.W = this.scale.width; this.H = this.scale.height;
    this.cameras.main.fadeIn(300);
    const vg = this.add.graphics(); vg.fillStyle(0x050810, 1); vg.fillRect(0,0,this.W,this.H);
    this.add.image(this.W/2, this.H/2, 'stadium_bg')
      .setScale(Math.max(this.W / this.textures.get('stadium_bg').source[0].width, this.H / this.textures.get('stadium_bg').source[0].height))
      .setAlpha(0.15);

    this.add.text(this.W/2, 60, 'LOCKER ROOM', { fontFamily:'Bebas Neue', fontSize:'60px', color:'#ffb800', stroke:'#000', strokeThickness:5, letterSpacing:6 }).setOrigin(0.5);
    this.cashTxt = this.add.text(this.W - 30, 60, '', { fontFamily:'Bebas Neue', fontSize:'28px', color:'#4aff8a' }).setOrigin(1, 0.5);
    this.lvlTxt = this.add.text(30, 60, '', { fontFamily:'Bebas Neue', fontSize:'28px', color:'#ffb800' }).setOrigin(0, 0.5);

    this.add.text(this.W/2, 130, 'EQUIPPED PERKS', { fontFamily:'Oswald', fontSize:'18px', color:'#aaa', letterSpacing:4 }).setOrigin(0.5);
    this.slotsCont = this.add.container(0, 0);
    this.poolCont = this.add.container(0, 0);

    makeAssetButton(this, this.W/2 - 130, this.H - 130, 'BACK', 'btn_concede', '#fff', () => { sfx('click'); this.cameras.main.fadeOut(300); this.time.delayedCall(300, () => this.scene.start('MenuScene')); }, { w: 240, fontSize: 28 });
    makeAssetButton(this, this.W/2 + 130, this.H - 130, 'RESET PROGRESS', 'btn_concede', '#fff', () => this.confirmReset(), { w: 240, fontSize: 24 });

    this.render();
  }

  render() {
    this.cashTxt.setText('$' + playerData.cash.toLocaleString());
    this.lvlTxt.setText('LV ' + playerData.coachLevel);
    this.slotsCont.removeAll(true);
    this.poolCont.removeAll(true);
    // Three slots
    const slotW = 240, slotH = 110, gap = 16;
    const startX = this.W/2 - (slotW * 1.5 + gap);
    for (let i=0;i<3;i++) {
      const x = startX + i * (slotW + gap);
      const y = 170;
      const cont = this.add.container(x + slotW/2, y + slotH/2);
      const bg = this.add.graphics();
      const perkId = playerData.perksEquipped[i];
      if (perkId) {
        bg.fillStyle(0x1a2030, 0.95); bg.fillRoundedRect(-slotW/2, -slotH/2, slotW, slotH, 12);
        bg.lineStyle(2, 0xffb800, 0.9); bg.strokeRoundedRect(-slotW/2, -slotH/2, slotW, slotH, 12);
        cont.add(bg);
        const perk = getPerk(perkId);
        cont.add(this.add.text(-slotW/2 + 12, -28, perk.icon, { fontFamily:'Bebas Neue', fontSize:'36px' }).setOrigin(0, 0.5));
        cont.add(this.add.text(-slotW/2 + 56, -28, perk.name, { fontFamily:'Bebas Neue', fontSize:'22px', color:'#ffb800' }).setOrigin(0, 0.5));
        cont.add(this.add.text(-slotW/2 + 12, 6, perk.desc, { fontFamily:'Oswald', fontSize:'13px', color:'#e8e8e0', wordWrap:{ width: slotW - 24 } }).setOrigin(0, 0.5));
        const unEq = makeAssetButton(this, 0, 38, 'UNEQUIP', 'btn_concede', '#fff', () => { sfx('click'); this.unequip(perkId); }, { w: 140, fontSize: 18 });
        unEq.setScale(0.7);
        cont.add(unEq);
      } else {
        bg.fillStyle(0x0d1320, 0.7); bg.fillRoundedRect(-slotW/2, -slotH/2, slotW, slotH, 12);
        bg.lineStyle(2, 0x444444, 0.7); bg.strokeRoundedRect(-slotW/2, -slotH/2, slotW, slotH, 12);
        cont.add(bg);
        cont.add(this.add.text(0, 0, 'EMPTY', { fontFamily:'Bebas Neue', fontSize:'26px', color:'#666', letterSpacing:4 }).setOrigin(0.5));
      }
      this.slotsCont.add(cont);
    }
    // Pool
    this.add.text(this.W/2, 340, 'AVAILABLE PERKS', { fontFamily:'Oswald', fontSize:'18px', color:'#aaa', letterSpacing:4 }).setOrigin(0.5);
    const pCols = 3, pCardW = 240, pCardH = 130, pGap = 18;
    const poolStartX = this.W/2 - (pCardW * (pCols/2)) - (pGap * (pCols-1)/2) + pCardW/2;
    PERK_POOL.forEach((perk, i) => {
      const col = i % pCols, row = Math.floor(i / pCols);
      const x = poolStartX + col * (pCardW + pGap);
      const y = 400 + row * (pCardH + pGap) + pCardH/2;
      const unlocked = playerData.perksUnlocked.includes(perk.id);
      const equipped = playerData.perksEquipped.includes(perk.id);
      const cont = this.add.container(x, y);
      const bg = this.add.graphics();
      bg.fillStyle(unlocked ? 0x1a2030 : 0x0d1018, 0.95);
      bg.fillRoundedRect(-pCardW/2, -pCardH/2, pCardW, pCardH, 12);
      bg.lineStyle(2, equipped ? 0x4aff8a : (unlocked ? 0xffb800 : 0x444444), 0.9);
      bg.strokeRoundedRect(-pCardW/2, -pCardH/2, pCardW, pCardH, 12);
      cont.add(bg);
      cont.add(this.add.text(-pCardW/2 + 12, -40, perk.icon, { fontFamily:'Bebas Neue', fontSize:'32px' }).setOrigin(0, 0.5));
      cont.add(this.add.text(-pCardW/2 + 52, -40, perk.name, { fontFamily:'Bebas Neue', fontSize:'20px', color: unlocked ? '#ffb800' : '#666' }).setOrigin(0, 0.5));
      cont.add(this.add.text(-pCardW/2 + 12, 0, perk.desc, { fontFamily:'Oswald', fontSize:'13px', color: unlocked ? '#e8e8e0' : '#666', wordWrap:{ width: pCardW - 24 } }).setOrigin(0, 0.5));
      if (equipped) {
        cont.add(this.add.text(0, 40, 'EQUIPPED', { fontFamily:'Bebas Neue', fontSize:'14px', color:'#4aff8a', letterSpacing:3 }).setOrigin(0.5));
      } else if (!unlocked) {
        cont.add(this.add.text(0, 40, 'UNLOCK AT LV ' + perk.unlockLevel, { fontFamily:'Bebas Neue', fontSize:'14px', color:'#888', letterSpacing:2 }).setOrigin(0.5));
      } else {
        cont.add(this.add.text(0, 40, 'TAP TO EQUIP', { fontFamily:'Oswald', fontSize:'14px', color:'#88ddff', letterSpacing:2 }).setOrigin(0.5));
        cont.setSize(pCardW, pCardH).setInteractive({ useHandCursor:true });
        cont.on('pointerup', () => { sfx('click'); this.tryEquip(perk.id); });
      }
      this.poolCont.add(cont);
    });
  }

  tryEquip(perkId) {
    if (!playerData.perksUnlocked.includes(perkId)) return;
    if (playerData.perksEquipped.includes(perkId)) return;
    if (playerData.perksEquipped.length < 3) {
      playerData.perksEquipped.push(perkId);
      savePlayerData(); this.render(); return;
    }
    this.showSwapModal(perkId);
  }

  unequip(perkId) {
    playerData.perksEquipped = playerData.perksEquipped.filter(p => p !== perkId);
    savePlayerData(); this.render();
  }

  showSwapModal(newPerkId) {
    const W = this.W, H = this.H;
    const newPerk = getPerk(newPerkId); if (!newPerk) return;
    const canAfford = playerData.cash >= PERK_SWAP_COST;
    const cont = this.add.container(W/2, H/2).setDepth(9000);
    const dim = this.add.graphics(); dim.fillStyle(0x000000, 0.85); dim.fillRect(-W/2, -H/2, W, H);
    cont.add(dim); dim.setInteractive(new Phaser.Geom.Rectangle(-W/2,-H/2,W,H), Phaser.Geom.Rectangle.Contains);
    const panel = this.add.graphics();
    panel.fillStyle(0x0d1320, 0.98); panel.fillRoundedRect(-340, -240, 680, 480, 16);
    panel.lineStyle(3, 0xffb800, 1); panel.strokeRoundedRect(-340, -240, 680, 480, 16);
    cont.add(panel);
    cont.add(this.add.text(0, -180, 'SWAP IN ' + newPerk.name + '?', { fontFamily:'Bebas Neue', fontSize:'32px', color:'#ffb800', letterSpacing:3, align:'center', wordWrap:{ width: 620 } }).setOrigin(0.5));
    cont.add(this.add.text(0, -120, canAfford ? 'Costs $' + PERK_SWAP_COST + '. Choose which slot to replace.' : 'Need $' + PERK_SWAP_COST + '. You have $' + playerData.cash.toLocaleString() + '. Unequip a perk (free) or earn more cash.', {
      fontFamily:'Oswald', fontSize:'18px', color:'#e8e8e0', align:'center', wordWrap:{ width: 620 }
    }).setOrigin(0.5));
    playerData.perksEquipped.forEach((eqId, i) => {
      const eq = getPerk(eqId);
      const btn = makeAssetButton(this, 0, -40 + i * 70, 'REPLACE ' + eq.icon + ' ' + eq.name, 'btn_concede', '#fff', () => {
        if (playerData.cash < PERK_SWAP_COST) return;
        playerData.cash -= PERK_SWAP_COST;
        const idx = playerData.perksEquipped.indexOf(eqId);
        if (idx >= 0) playerData.perksEquipped[idx] = newPerkId;
        savePlayerData(); cont.destroy(); this.render();
      }, { w: 500, fontSize: 22 });
      if (!canAfford) { btn.setAlpha(0.4); btn.disableInteractive(); }
      cont.add(btn);
    });
    cont.add(makeAssetButton(this, 0, 180, 'CANCEL', 'btn_concede', '#fff', () => cont.destroy(), { w: 240, fontSize: 26 }));
  }

  confirmReset() {
    const W = this.W, H = this.H;
    const step1 = this.add.container(W/2, H/2).setDepth(9100);
    const dim = this.add.graphics(); dim.fillStyle(0x000000, 0.9); dim.fillRect(-W/2, -H/2, W, H);
    step1.add(dim); dim.setInteractive(new Phaser.Geom.Rectangle(-W/2,-H/2,W,H), Phaser.Geom.Rectangle.Contains);
    const panel = this.add.graphics();
    panel.fillStyle(0x200000, 0.98); panel.fillRoundedRect(-340, -200, 680, 400, 16);
    panel.lineStyle(3, 0xff5a5a, 1); panel.strokeRoundedRect(-340, -200, 680, 400, 16);
    step1.add(panel);
    step1.add(this.add.text(0, -140, 'RESET ALL PROGRESS?', { fontFamily:'Bebas Neue', fontSize:'40px', color:'#ff5a5a', letterSpacing:3 }).setOrigin(0.5));
    step1.add(this.add.text(0, -50, 'Cash, level, perks — everything goes back to zero.', { fontFamily:'Oswald', fontSize:'20px', color:'#e8e8e0', align:'center', wordWrap:{ width: 620 } }).setOrigin(0.5));
    step1.add(makeAssetButton(this, -140, 110, 'CANCEL', 'btn_snap', '#fff', () => step1.destroy(), { w: 220, fontSize: 26 }));
    step1.add(makeAssetButton(this,  140, 110, 'CONTINUE', 'btn_concede', '#fff', () => { step1.destroy(); this.confirmReset2(); }, { w: 220, fontSize: 26 }));
  }

  confirmReset2() {
    const W = this.W, H = this.H;
    const c = this.add.container(W/2, H/2).setDepth(9100);
    const dim = this.add.graphics(); dim.fillStyle(0x000000, 0.9); dim.fillRect(-W/2, -H/2, W, H);
    c.add(dim); dim.setInteractive(new Phaser.Geom.Rectangle(-W/2,-H/2,W,H), Phaser.Geom.Rectangle.Contains);
    const panel = this.add.graphics();
    panel.fillStyle(0x200000, 0.98); panel.fillRoundedRect(-340, -200, 680, 400, 16);
    panel.lineStyle(3, 0xff5a5a, 1); panel.strokeRoundedRect(-340, -200, 680, 400, 16);
    c.add(panel);
    c.add(this.add.text(0, -140, 'REALLY SURE?', { fontFamily:'Bebas Neue', fontSize:'40px', color:'#ff5a5a', letterSpacing:3 }).setOrigin(0.5));
    c.add(this.add.text(0, -50, 'This cannot be undone.\n\nFinal step: type DELETE.', { fontFamily:'Oswald', fontSize:'20px', color:'#e8e8e0', align:'center', wordWrap:{ width: 620 } }).setOrigin(0.5));
    c.add(makeAssetButton(this, -140, 110, 'CANCEL', 'btn_snap', '#fff', () => c.destroy(), { w: 220, fontSize: 26 }));
    c.add(makeAssetButton(this,  140, 110, 'TYPE DELETE', 'btn_concede', '#fff', () => {
      c.destroy();
      const typed = prompt('Type DELETE to confirm:');
      if (typed === 'DELETE') {
        clearPlayerData();
        clearSeason();
        showToast(this, 'PROGRESS RESET', 1500, '#ff5a5a');
        this.time.delayedCall(1200, () => this.render());
      }
    }, { w: 220, fontSize: 22 }));
  }
}

// ============================================================
// BOOTSTRAP: register all scenes
// ============================================================
config.scene = [BootScene, MenuScene, GameScene, ConversionScene, DraftScene, SeasonHubScene, RosterScene, MatchSummaryScene, LockerRoomScene, EndScene];
const game = new Phaser.Game(config);
// Expose so the iOS visualViewport refit closure (declared higher up) can call game.scale.refresh().
window.game = game;

// Defer-toast plumbing: shown on next MenuScene create
game.events.on('step', () => {
  if (showToastDefer) {
    const scene = game.scene.getScene('MenuScene');
    if (scene && scene.scene.isActive('MenuScene')) {
      showToast(scene, showToastDefer, 2400, '#ff5a5a');
      showToastDefer = null;
    }
  }
});
</script>
</body>
</html>
