  render() {
    this.youScoreText.setText(G.youScore);
    this.aiScoreText.setText(G.aiScore);
    this.driveText.setText(`DRIVE ${G.drive} / ${MAX_DRIVES}`);
    const q = Math.ceil(G.drive/2);
    this.quarterText.setText(`${['1ST','2ND','3RD','4TH'][q-1]} QUARTER`);
    const energy = G.youEnergy - pendingCost();
    this.energyText.setText(energy);
    this.energyOrb.setFillStyle(energy <= 0 ? 0x555555 : 0xffb800);
    this.energyOrbGlow.setAlpha(energy <= 0 ? 0.1 : 0.4);
    this.deckCountText.setText(G.youDeck.length);
    this.discardCountText.setText(G.youDiscard.length);
    this.redrawLaneContents();
    this.redrawHand();
    this.drawSnapBtn();

    // Reshuffle pulse (Phase 8 polish)
    if (G._reshuffleFlash) {
      G._reshuffleFlash = false;
      sfx('reshuffle');
      this.tweens.add({ targets: this.discardBadge, scale: 1.18, duration: 220, yoyo: true, ease:'Sine.inOut' });
    }
  }

  redrawLaneContents() {
    G.lanes.forEach((lane, idx) => {
      const layer = this.laneCardLayers[idx];
      layer.removeAll(true);
      this.renderLaneOverlay(idx);

      if (this.isH) {
        // Horizontal lane: cards fan along the drive axis (X). CPU on the
        // left half, YOU on the right; front card of each side sits just
        // past the central modifier+pill cluster. Cards are sized from
        // LANE_THICK because vertical space (across the lane) is the binding
        // constraint — 2 rows of cards must fit inside the inner Y band.
        const slotW = this.LANE_THICK * 0.35;
        const cardH = slotW * 1.38;
        const stepX = slotW * 0.40;
        const rowYOffset = cardH * 0.35;
        // modClear keeps card 0 (front of each side) past the pill cluster's
        // outer edge with a small visual gap.
        const modClear = 174;
        const cpuAnchorX = -(modClear + slotW/2);
        const youAnchorX = +(modClear + slotW/2);
        this._layoutStackH(layer, lane.aiCards,  'ai',  slotW, cardH, stepX, rowYOffset, cpuAnchorX);
        this._layoutStackH(layer, lane.youCards, 'you', slotW, cardH, stepX, rowYOffset, youAnchorX);
        return;
      }

      // Cards are big (42% of lane width) because they overlap — each successive
      // card is offset 40% right of the previous, so 60% of every card stays
      // visible. Cost circle (top-left) is preserved because cards fan LEFT→RIGHT;
      // stat box (bottom-center) is preserved because horizontal offset ≤ 50%.
      const slotW = this.LANE_W * 0.42;
      const cardH = slotW * 1.38;
      const stepX = slotW * 0.40;
      const rowYOffset = cardH * 0.35;   // 35% of back row peeks past front row
      const rowXShift  = slotW * 0.20;   // back row staggered to peek between front cards

      // Front-row anchor: card center sits one half-height outside the modifier
      // band (75 px) so the modifier medallion stays uncovered.
      const modClear = 75;
      const cpuAnchorY = -(modClear + cardH/2);   // card 0 sits at line of scrimmage (top side)
      const youAnchorY = +(modClear + cardH/2);   // mirror for YOU

      this._layoutStack(layer, lane.aiCards,  'ai',  slotW, cardH, stepX, rowYOffset, rowXShift, cpuAnchorY);
      this._layoutStack(layer, lane.youCards, 'you', slotW, cardH, stepX, rowYOffset, rowXShift, youAnchorY);
      // Drop zones still cover the full lane via lane container.
    });
  }

  // Horizontal-orientation equivalent of _layoutStack. Cards fan along X away
  // from the lane's vertical center line (CPU leftward, YOU rightward). 5–8
  // cards spill into a second row offset along Y. Preserves the same
  // ±3° rotation fan, pending-pulse border, attachInspect on revealed cards,
  // and asymmetric draw-order rule from the vertical version.
  _layoutStackH(layer, cards, side, slotW, cardH, stepX, rowYOffset, anchorX) {
    const n = cards.length;
    if (n === 0) return;
    const dirX = side === 'you' ? 1 : -1;
    const placeRow = (rowCards, rowY) => {
      const rn = rowCards.length;
      rowCards.forEach((c, i) => {
        const x = anchorX + dirX * i * stepX;
        const rot = (i - (rn - 1) / 2) * 0.05;
        const card = buildCard(this, c, slotW, { hidden: !c.revealed });
        card.x = x; card.y = rowY;
        card.setRotation(rot);
        if (c.pending) {
          card.setAlpha(0.85);
          const pulse = this.add.graphics();
          pulse.lineStyle(3, 0xffb800, 1);
          pulse.strokeRoundedRect(-card.cardWidth/2 - 3, -card.cardHeight/2 - 3, card.cardWidth + 6, card.cardHeight + 6, 8);
          card.add(pulse);
          if (!this.reduced) this.tweens.add({ targets: pulse, alpha: 0.3, duration: 600, yoyo: true, repeat: -1, ease:'Sine.inOut' });
        }
        if (c.revealed) this.attachInspect(card, c);
        layer.add(card);
      });
    };
    if (n <= 4) {
      placeRow(cards, 0);
      return;
    }
    const front = cards.slice(0, 4);
    const back  = cards.slice(4, 8);
    const frontY = -rowYOffset/2;
    const backY  =  rowYOffset/2;
    // Asymmetric draw order mirrors the vertical version: for YOU we draw the
    // back row first so the front row (closer to the line of scrimmage) sits
    // on top and keeps its stat number visible; for CPU we draw the front row
    // first so the back row covers the front cost circle (CPU costs aren't
    // shown anyway) while keeping the back row's stat visible.
    if (side === 'you') {
      placeRow(back,  backY);
      placeRow(front, frontY);
    } else {
      placeRow(front, frontY);
      placeRow(back,  backY);
    }
  }

  // Lay out a side's cards as a fanned overlap stack:
  //   n ≤ 4 → single fanned row centered at anchorY
  //   n ≥ 5 → cards 0-3 in front row, 4-7 in back row spilling OUTWARD from the
  //           modifier (CPU back row sits above, YOU back row sits below).
  // Cards are added to the layer in play order so later cards naturally render
  // on top (Phaser Containers render children in insert order).
  _layoutStack(layer, cards, side, slotW, cardH, stepX, rowYOffset, rowXShift, anchorY) {
    const n = cards.length;
    if (n === 0) return;
    const placeRow = (rowCards, rowY, xShift, depthBase) => {
      const rn = rowCards.length;
      const rowW = slotW + (rn - 1) * stepX;
      const startX = -rowW / 2 + slotW / 2 + (xShift || 0);
      rowCards.forEach((c, i) => {
        const x = startX + i * stepX;
        const rot = (i - (rn - 1) / 2) * 0.05;  // ±3° fan
        const card = buildCard(this, c, slotW, { hidden: !c.revealed });
        card.x = x; card.y = rowY;
        card.setRotation(rot);
        if (c.pending) {
          card.setAlpha(0.85);
          const pulse = this.add.graphics();
          pulse.lineStyle(3, 0xffb800, 1);
          pulse.strokeRoundedRect(-card.cardWidth/2 - 3, -card.cardHeight/2 - 3, card.cardWidth + 6, card.cardHeight + 6, 8);
          card.add(pulse);
          if (!this.reduced) this.tweens.add({ targets: pulse, alpha: 0.3, duration: 600, yoyo: true, repeat: -1, ease:'Sine.inOut' });
        }
        if (c.revealed) this.attachInspect(card, c);
        layer.add(card);
      });
    };

    if (n <= 4) {
      placeRow(cards, anchorY, 0, 0);
      return;
    }
    // Two-row layout: front row anchored at the line of scrimmage, back row
    // spills outward (YOU → toward player, CPU → toward top edge).
    const front = cards.slice(0, 4);
    const back  = cards.slice(4, 8);
    const dirMul = (side === 'you') ? 1 : -1;
    const backY = anchorY + dirMul * rowYOffset;
    // Asymmetric draw order: always draw the row farther from the line of
    // scrimmage FIRST so the row closer to the line sits on top. This keeps
    // the front row's stat number (the snap-time read) visible:
    //   CPU side: back row is above (toward top edge) → front drawn first,
    //             back on top covers front's COST (we don't show CPU costs).
    //   YOU side: back row is below (toward player) → back drawn first,
    //             front on top covers back row's COST circle, but back row's
    //             stat stays visible and the front row's stat is intact.
    if (side === 'you') {
      placeRow(back,  backY,   rowXShift, 0);
      placeRow(front, anchorY, 0,         4);
    } else {
      placeRow(front, anchorY, 0,         0);
      placeRow(back,  backY,   rowXShift, 4);
    }
  }

  attachInspect(cardCont, cardData) {
    cardCont.setSize(cardCont.cardWidth, cardCont.cardHeight);
    cardCont.setInteractive({ useHandCursor:true });
    cardCont.on('pointerup', () => this.showCardInspect(cardData));
  }

  showCardInspect(card) {
    const W = this.W, H = this.H;
    const cont = this.add.container(W/2, H/2).setDepth(9500);
    const dim = this.add.graphics(); dim.fillStyle(0x000000, 0.8); dim.fillRect(-W/2, -H/2, W, H);
    cont.add(dim);
    dim.setInteractive(new Phaser.Geom.Rectangle(-W/2, -H/2, W, H), Phaser.Geom.Rectangle.Contains);
    dim.on('pointerup', () => cont.destroy());
    const big = buildCard(this, card, 360);
    big.x = 0; big.y = -120;
    cont.add(big);
    if (card.ability) {
      cont.add(this.add.text(0, 160, card.ability, {
        fontFamily:'Oswald', fontSize:'24px', color:'#ffb800', stroke:'#000', strokeThickness:3, align:'center', wordWrap:{ width: 600 }
      }).setOrigin(0.5));
    }
    cont.add(this.add.text(0, 220, `${card.pos} · ${card.team} · ${card.rarity.toUpperCase()}`, {
      fontFamily:'Oswald', fontSize:'20px', color:'#aaa', letterSpacing:2
    }).setOrigin(0.5));
    cont.add(this.add.text(0, 320, 'tap anywhere to close', { fontFamily:'Oswald', fontSize:'16px', color:'#666' }).setOrigin(0.5));
  }

  // "Show your work" for the power pill: lists every revealed card's
  // contribution, modifier/synergy/perk attributions, the enemy DEF
  // subtraction, any at-snap yard-block adjustments, and the COIN FLIP
  // caveat. Read-only: builds from buildYardageBreakdown(), never mutates
  // game state. The NET line at the bottom is pulled from the same helper
  // the power pill uses (netYardsBasic), so they can never disagree.
  showYardageBreakdown(lane, side) {
    const b = buildYardageBreakdown(lane, side);
    const W = this.W, H = this.H;
    const cont = this.add.container(W/2, H/2).setDepth(9500);

    const dim = this.add.graphics();
    dim.fillStyle(0x000000, 0.85);
    dim.fillRect(-W/2, -H/2, W, H);
    cont.add(dim);
    dim.setInteractive(new Phaser.Geom.Rectangle(-W/2, -H/2, W, H), Phaser.Geom.Rectangle.Contains);

    const panelW = Math.min(W - 40, 760);
    const panelH = Math.min(H - 80, 1200);
    const panel = this.add.graphics();
    panel.fillStyle(0x0d1320, 0.98);
    panel.fillRoundedRect(-panelW/2, -panelH/2, panelW, panelH, 16);
    panel.lineStyle(3, 0xffb800, 1);
    panel.strokeRoundedRect(-panelW/2, -panelH/2, panelW, panelH, 16);
    cont.add(panel);

    // Panel-area pointer-eater: swallows taps so they don't bubble through to
    // the dim's tap-to-close handler. Also doubles as the drag-scroll surface
    // when content overflows the visible region.
    const panelHit = this.add.zone(0, 0, panelW, panelH).setInteractive();
    cont.add(panelHit);

    // Close on dim tap, but only if both pointerdown AND pointerup happened
    // on the dim — otherwise a drag-scroll that ends over the dim would
    // accidentally dismiss the modal.
    let dimDownOk = false;
    dim.on('pointerdown', () => { dimDownOk = true; });
    dim.on('pointerup',   () => { if (dimDownOk) { dimDownOk = false; cont.destroy(); } });
    panelHit.on('pointerdown', () => { dimDownOk = false; });

    const sideName = side === 'you' ? 'YOUR' : 'CPU';
    const enemyName = side === 'you' ? 'CPU' : 'YOUR';
    cont.add(this.add.text(0, -panelH/2 + 32, b.laneName + ' LANE — ' + sideName + ' NET YARDS', {
      fontFamily: 'Bebas Neue', fontSize: '28px', color: '#ffb800',
      stroke: '#000', strokeThickness: 4, letterSpacing: 3,
      align: 'center', wordWrap: { width: panelW - 40 }
    }).setOrigin(0.5));

    // Empty state — no cards to break down. computeLaneStats excludes pending
    // cards, so pre-snap player commitments don't appear in entries; surface
    // them here so the player isn't surprised that "no cards revealed" shows
    // up when their just-dropped cards are visible in the lane.
    if (!b.offEntries.length && !b.defEntries.length) {
      const myKey = side === 'you' ? 'youCards' : 'aiCards';
      const pendingCount = lane[myKey].filter(c => c.revealed && c.pending && !c.ejected).length;
      const empty = pendingCount > 0
        ? 'No cards have snapped\nin this lane yet.\n\n(' + pendingCount + ' committed — counts at SNAP)'
        : 'No cards revealed\nin this lane yet.';
      cont.add(this.add.text(0, 0, empty, {
        fontFamily: 'Oswald', fontSize: '22px', color: '#aaa', align: 'center', lineSpacing: 4
      }).setOrigin(0.5));
      cont.add(makeAssetButton(this, 0, panelH/2 - 50, 'GOT IT', 'btn_snap', '#fff',
        () => cont.destroy(), { w: 240, fontSize: 26 }));
      return;
    }

    const headerH = 70;
    const footerH = 90;
    const visibleTop = -panelH/2 + headerH;
    const visibleH   = panelH - headerH - footerH;

    const scrollCont = this.add.container(0, visibleTop);
    cont.add(scrollCont);

    let y = 0;
    const leftX  = -panelW/2 + 20;
    const rightX =  panelW/2 - 20;
    const indentX = -panelW/2 + 36;
    const innerW = panelW - 40;

    const addLeft = (txt, opts) => {
      const t = this.add.text(leftX, y, txt, opts);
      scrollCont.add(t);
      return t;
    };
    const addRight = (txt, opts) => {
      const t = this.add.text(rightX, y, txt, opts).setOrigin(1, 0);
      scrollCont.add(t);
      return t;
    };
    const addDivider = (opacity) => {
      const g = this.add.graphics();
      g.lineStyle(1, 0xffb800, opacity);
      g.beginPath(); g.moveTo(leftX, y); g.lineTo(rightX, y); g.strokePath();
      scrollCont.add(g);
    };

    // ---------- MY OFFENSE ----------
    addLeft(sideName + ' OFFENSE', {
      fontFamily: 'Bebas Neue', fontSize: '20px', color: '#88ddff', letterSpacing: 3
    });
    y += 30;

    if (b.offEntries.length === 0) {
      addLeft('(no revealed OFF cards)', {
        fontFamily: 'Oswald', fontSize: '14px', color: '#777'
      });
      y += 22;
    } else {
      b.offEntries.forEach(e => {
        addLeft(e.pos + ' ' + e.name, {
          fontFamily: 'Oswald', fontSize: '16px', color: '#fff'
        });
        const deltaStr = e.delta === 0 ? '' : (e.delta > 0 ? '  (+' + e.delta + ')' : '  (' + e.delta + ')');
        const deltaColor = e.delta > 0 ? '#4aff8a' : e.delta < 0 ? '#ff5a5a' : '#fff';
        addRight(e.base + ' → ' + e.cur + deltaStr, {
          fontFamily: 'JetBrains Mono', fontSize: '14px', color: deltaColor
        });
        y += 22;
        if (e.reasons.length) {
          const r = this.add.text(indentX, y, e.reasons.join('  ·  '), {
            fontFamily: 'Oswald', fontSize: '12px', color: '#aaa',
            wordWrap: { width: innerW - 24 }
          });
          scrollCont.add(r);
          y += r.height + 4;
        } else {
          y += 4;
        }
      });
    }

    y += 8;
    addDivider(0.5);
    y += 12;
    addLeft('OFF subtotal: ' + b.myOffSum, {
      fontFamily: 'Oswald', fontSize: '18px', color: '#fff', stroke: '#000', strokeThickness: 2
    });
    addRight('+' + b.myContrib + ' YDS', {
      fontFamily: 'Bebas Neue', fontSize: '22px', color: '#4aff8a', stroke: '#000', strokeThickness: 3
    });
    y += 36;

    // ---------- ENEMY DEFENSE ----------
    addLeft(enemyName + ' DEFENSE', {
      fontFamily: 'Bebas Neue', fontSize: '20px', color: '#ff8a8a', letterSpacing: 3
    });
    y += 30;

    if (b.defEntries.length === 0) {
      addLeft('(no revealed DEF cards)', {
        fontFamily: 'Oswald', fontSize: '14px', color: '#777'
      });
      y += 22;
    } else {
      b.defEntries.forEach(e => {
        addLeft(e.pos + ' ' + e.name, {
          fontFamily: 'Oswald', fontSize: '14px', color: '#ccc'
        });
        addRight(e.base + ' → ' + e.cur, {
          fontFamily: 'JetBrains Mono', fontSize: '12px', color: '#aaa'
        });
        y += 18;
      });
      y += 4;
    }

    addLeft('DEF subtotal: ' + b.theirDefSum, {
      fontFamily: 'Oswald', fontSize: '18px', color: '#fff', stroke: '#000', strokeThickness: 2
    });
    addRight('−' + b.theirContrib + ' YDS', {
      fontFamily: 'Bebas Neue', fontSize: '22px', color: '#ff5a5a', stroke: '#000', strokeThickness: 3
    });
    y += 36;

    // ---------- AT-SNAP YARD BLOCKS ----------
    if (b.yardBlocks.length) {
      addLeft('AT-SNAP ADJUSTMENTS', {
        fontFamily: 'Bebas Neue', fontSize: '16px', color: '#ffaa44', letterSpacing: 2
      });
      y += 26;
      b.yardBlocks.forEach(yb => {
        addLeft(yb.pos + ' ' + yb.name + ' yard block', {
          fontFamily: 'Oswald', fontSize: '14px', color: '#ccc'
        });
        addRight('−5 YDS', {
          fontFamily: 'Bebas Neue', fontSize: '18px', color: '#ff5a5a', stroke: '#000', strokeThickness: 2
        });
        y += 22;
      });
      y += 4;
    }

    // ---------- MODIFIER NOTE ----------
    if (b.modifier) {
      addLeft('MODIFIER: ' + b.modifier.name, {
        fontFamily: 'Bebas Neue', fontSize: '16px', color: b.modifier.color, letterSpacing: 2
      });
      y += 22;
      const dt = this.add.text(indentX, y, b.modifier.desc, {
        fontFamily: 'Oswald', fontSize: '13px', color: '#ccc',
        wordWrap: { width: innerW - 24 }
      });
      scrollCont.add(dt);
      y += dt.height + 10;
    }

    // ---------- COIN FLIP ----------
    if (b.coinFlip) {
      const cf = this.add.text(0, y, '⚠ COIN FLIP may double or halve this at SNAP', {
        fontFamily: 'Oswald', fontSize: '14px', color: '#dd99ff',
        align: 'center', wordWrap: { width: innerW }
      }).setOrigin(0.5, 0);
      scrollCont.add(cf);
      y += cf.height + 8;
    }

    // ---------- FINAL NET ----------
    y += 6;
    addDivider(0.85);
    y += 14;
    addLeft('NET', {
      fontFamily: 'Bebas Neue', fontSize: '32px', color: '#fff',
      stroke: '#000', strokeThickness: 4, letterSpacing: 4
    });
    // NET color matches pill semantic: green = good for player, red = bad.
    const goodForPlayer = side === 'you' ? (b.net > 0) : (b.net < 0);
    const netColor = b.net === 0 ? '#aaa' : (goodForPlayer ? '#4aff8a' : '#ff5a5a');
    addRight((b.net >= 0 ? '+' : '') + b.net + ' YDS', {
      fontFamily: 'Bebas Neue', fontSize: '40px', color: netColor,
      stroke: '#000', strokeThickness: 5
    });
    y += 56;

    if (b.offEntries.some(e => e.delta !== 0) || b.defEntries.some(e => e.delta !== 0)) {
      const fn = this.add.text(0, y, 'rounding/clamping may shift individual deltas', {
        fontFamily: 'Oswald', fontSize: '11px', color: '#666',
        align: 'center', wordWrap: { width: innerW }
      }).setOrigin(0.5, 0);
      scrollCont.add(fn);
      y += fn.height + 6;
    }

    // ---------- SCROLL ----------
    // If total content exceeds the visible region, mask off everything outside
    // it and let the user drag to scroll. Mask coords are world-space because
    // GeometryMask reads the graphics object's drawn shape in world coords.
    const contentH = y;
    if (contentH > visibleH) {
      const mask = this.make.graphics({ x: 0, y: 0, add: false });
      mask.fillStyle(0xffffff);
      mask.fillRect(W/2 - panelW/2, H/2 + visibleTop, panelW, visibleH);
      scrollCont.setMask(mask.createGeometryMask());

      cont.add(this.add.text(panelW/2 - 8, panelH/2 - 60, '⇕ drag to scroll', {
        fontFamily: 'Oswald', fontSize: '11px', color: '#666'
      }).setOrigin(1, 1));

      let dragState = null;
      const minY = visibleTop - (contentH - visibleH);
      const maxY = visibleTop;
      panelHit.on('pointerdown', p => {
        dragState = { startY: p.y, startContY: scrollCont.y };
      });
      panelHit.on('pointermove', p => {
        if (!dragState) return;
        const dy = p.y - dragState.startY;
        scrollCont.y = Math.min(maxY, Math.max(minY, dragState.startContY + dy));
      });
      const endDrag = () => { dragState = null; };
      panelHit.on('pointerup',  endDrag);
      panelHit.on('pointerout', endDrag);
    }

    cont.add(makeAssetButton(this, 0, panelH/2 - 50, 'GOT IT', 'btn_snap', '#fff',
      () => cont.destroy(), { w: 240, fontSize: 26 }));
  }

  redrawHand() {
    this.handContainer.removeAll(true);
    const energy = G.youEnergy - pendingCost();
    const cards = G.youHand;
    if (!cards.length) return;
    // Bumped from 120 → 160 so cards stay readable on a fitted iPhone canvas
    // (FIT mode scales the logical 900px down to ~430px CSS px, so 160 logical
    // ≈ 76 CSS px wide — large enough to read the stat and tap reliably).
    const cardW = 160;
    // Badges live 85px from each side edge; reserve a comfortable strip beyond
    // them so a 5-card spread doesn't crowd or overlap the badges.
    const usableW = this.W - 60;
    const idealSpacing = cardW + 8;
    const spacing = Math.min(idealSpacing, usableW / cards.length);
    const startX = -(spacing * (cards.length - 1)) / 2;

    cards.forEach((card, i) => {
      const x = startX + i * spacing;
      const affordable = card.cost <= energy;
      const handCard = buildCard(this, card, cardW, { dimmed: !affordable, contextHand: true });
      handCard.x = x; handCard.y = 0;
      handCard.dataCard = card;
      this.handContainer.add(handCard);

      // Explicit Rectangle hit area — auto-sizing from setSize is unreliable on
      // touch when the object lives inside a Container. Pass draggable in the
      // same setInteractive call so the flag is set atomically (separate
      // setDraggable() has a race that drops the first touch on some Phaser builds).
      const hitW = handCard.cardWidth, hitH = handCard.cardHeight;
      const hitArea = new Phaser.Geom.Rectangle(-hitW/2, -hitH/2, hitW, hitH);
      handCard.setInteractive({
        hitArea,
        hitAreaCallback: Phaser.Geom.Rectangle.Contains,
        useHandCursor: true,
        draggable: affordable
      });

      // Tap vs drag: time-based (under 250ms with no dragstart = tap-to-inspect).
      // Don't use a pointermove threshold — touch jitter trips it before Phaser's
      // own drag detection kicks in, leaving the card in a half-dragged state.
      let downTime = 0;
      let didDragStart = false;
      handCard.on('pointerdown', () => { downTime = performance.now(); didDragStart = false; });
      handCard.on('pointerup',   () => {
        const held = performance.now() - downTime;
        if (!didDragStart && held < 250) this.showCardInspect(card);
      });

      if (affordable) {
        // pointerover is mouse-only — touch users get visual feedback on dragstart instead.
        handCard.on('pointerover', () => { if (!handCard.input.isDragging && !this.reduced) this.tweens.add({ targets: handCard, y: -16, scale: 1.06, duration: 150 }); });
        handCard.on('pointerout',  () => { if (!handCard.input.isDragging && !this.reduced) this.tweens.add({ targets: handCard, y: 0,  scale: 1,    duration: 150 }); });
        handCard.on('dragstart', () => {
          didDragStart = true;
          handCard.setDepth(2000);
          // Quick tactile pop so touch users see the card "pick up" — important
          // because there's no hover state on touch to telegraph the drag.
          this.tweens.add({ targets: handCard, scale: 1.15, duration: 80, ease:'Cubic.out' });
        });
        // dragX/dragY are in the parent container's local space (Phaser handles
        // the inverse transform), so assigning directly tracks the finger.
        handCard.on('drag', (p, dx, dy) => { handCard.x = dx; handCard.y = dy; });
      }
    });
  }

  handleDrop(go, dz) {
    if (!go.dataCard) return;
    const card = go.dataCard;
    const lane = G.lanes[dz.laneIdx];
    if (lane.youCards.length >= MAX_SLOTS) { this.showFloat('LANE FULL', '#ff5a5a'); this.returnCardToHand(go); return; }
    const cost = effectiveCost(card, lane);
    const energy = G.youEnergy - pendingCost();
    if (cost > energy) { this.showFloat('NOT ENOUGH ENERGY', '#ff5a5a'); this.returnCardToHand(go); return; }
    if (!G.youHand.find(c => c.id === card.id)) { this.returnCardToHand(go); return; }
    // Player cards land face-up — they were face-up in hand a second ago and
    // hiding them on drop is a visual regression. CPU cards stay face-down
    // (revealed:false) until SNAP; see aiMakePlays. The `pending` flag still
    // drives the gold pulse border + SNAP-time ability dispatch in
    // revealAllPending(), so commitment + reveal-order semantics are intact.
    const placed = { ...card, curOff: card.off, curDef: card.def, revealed:true, pending:true };
    lane.youCards.push(placed);
    G.pendingPlays.push({ card: placed, lane: dz.laneIdx, side:'you', effectiveCost: cost });
    G.youHand = G.youHand.filter(c => c.id !== card.id);
    sfx('play');
    this.render();
  }

  returnCardToHand(go) {
    if (go.input) this.tweens.add({ targets: go, x: go.input.dragStartX, y: go.input.dragStartY, scale: 1, duration: 250, ease:'Back.out' });
  }

  async endDrive() {
    if (G.busy) return;
    G.busy = true;
    this.aiMakePlays();
    this.render();
    await this.delay(300);
    this.cameras.main.flash(150, 255, 255, 255, false);
    sfx('snap'); this.showFloat('SNAP!', '#ffb800', 80);
    await this.delay(500);
    await this.revealAllPending();
    this.render();
    await this.delay(400);
    await this.processYardageAndScoring();
    this.render();
    await this.delay(400);

    // Halftime trailing-by-14 capture (Phase 6)
    if (G.drive === 4 && G._wasTrailingBy14 === undefined) {
      G._wasTrailingBy14 = (G.aiScore - G.youScore) >= 14;
    }

    if (G.drive >= MAX_DRIVES) { await this.delay(400); this.endMatch(); return; }

    // Discard arc animation (Phase 8) before bookkeeping
    await this.animateDiscardHand();
    discardHand('ai'); drawCardsToHand('ai', getHandSize('ai'));
    G.drive++;
    const gain = G.drive;
    G.youEnergy = Math.min(getMaxEnergyBank(),      G.youEnergy + gain);
    G.aiEnergy  = Math.min(getMaxEnergyBank('ai'),  G.aiEnergy  + gain);
    drawCardsToHand('you', getHandSize());
    this.render();
    await this.animateDrawIn();
    G.busy = false;
    this.render();
  }

  // ---- Phase 1: SNAP reveal in winner-first order + ability dispatch ----
  // YOUR cards are already face-up (revealed:true since placement) — no flip
  // animation needed, just clear pending so the pulse stops and modifiers
  // apply. The reveal SFX + per-card delay only fire for CPU cards, where
  // the face-down → face-up flip is actual hidden-info disclosure.
  async revealAllPending() {
    const youFirst = G.youScore >= G.aiScore;
    const order = youFirst ? ['you','ai'] : ['ai','you'];
    for (const side of order) {
      const plays = G.pendingPlays.filter(p => p.side === side);
      for (const play of plays) {
        play.card.revealed = true;
        play.card.pending = false;
        play.card._baseOff = play.card.off;
        play.card._baseDef = play.card.def;
        await this.applyCardSnapAbility(play);
        computeLaneStats(G.lanes[play.lane]);
        if (side === 'ai') {
          sfx('reveal');
          this.render();
          await this.delay(this.reduced ? 80 : 220);
        }
      }
      if (side === 'you') this.render();
    }
    G.pendingPlays = [];
    G.lanes.forEach(l => computeLaneStats(l));
  }

  async applyCardSnapAbility(play) {
    const card = play.card;
    const lane = G.lanes[play.lane];
    const side = play.side;
    const friendlies = side==='you' ? 'youCards' : 'aiCards';
    const enemies    = side==='you' ? 'aiCards'  : 'youCards';
    if (lane.modifier && lane.modifier.id === 'frozenTundra') return;
    const triggerCount = (lane.modifier && lane.modifier.id === 'blitzZone' && card.side === 'def') ? 2 : 1;
    for (let trig = 0; trig < triggerCount; trig++) {
      switch (card.desc) {
        case 'snapDraw':
          drawCardsToHand(side, 1);
          break;
        case 'snapBuffOffLane':
          lane[friendlies].filter(c => c.uid !== card.uid && c.revealed && !c.ejected && c.side === 'off')
            .forEach(c => { c._baseOff = (c._baseOff || c.off) + 6; });
          break;
        case 'snapDebuffEnemyOff':
          lane[enemies].filter(c => c.revealed && !c.ejected && c.side === 'off')
            .forEach(c => { c._baseOff = Math.max(0, (c._baseOff || c.off) - 8); });
          break;
        case 'snapStealYards':
          if (side === 'you') { lane.aiPos = Math.max(0, lane.aiPos - 10); lane.youPos = Math.min(100, lane.youPos + 10); }
          else                { lane.youPos = Math.max(0, lane.youPos - 10); lane.aiPos = Math.min(100, lane.aiPos + 10); }
          break;
        case 'snapDefYards':
          if (side === 'you') lane.aiPos = Math.max(0, lane.aiPos - 12);
          else                lane.youPos = Math.max(0, lane.youPos - 12);
          break;
        case 'snapPunt':
          if (side === 'you') lane.aiPos = Math.max(0, lane.aiPos - 10);
          else                lane.youPos = Math.max(0, lane.youPos - 10);
          break;
        case 'snapFieldGoal': {
          if (lane.modifier && lane.modifier.id === 'windTunnel') break;
          const myPos = side === 'you' ? lane.youPos : lane.aiPos;
          const hasKickingUnit = (side === 'you' ? lane.youCards : lane.aiCards)
            .some(c => c.revealed && !c.ejected && c.pos === 'ST');
          const fgThreshold = hasKickingUnit ? 35 : 50;
          if (myPos >= fgThreshold) {
            if (side === 'you') G.youScore += 3; else G.aiScore += 3;
            sfx('fg');
            await this.showScoreBurst('FIELD GOAL +3', side, false);
            this.resetLane(lane);
          }
          break;
        }
        case 'snapBuffAllOff':
          G.lanes.forEach(l => l[friendlies].filter(c => c.uid !== card.uid && c.revealed && !c.ejected && c.side === 'off')
            .forEach(c => { c._baseOff = (c._baseOff || c.off) + 8; }));
          break;
      }
    }
  }

  async processYardageAndScoring() {
    for (let i=0;i<G.lanes.length;i++) {
      const lane = G.lanes[i];
      if (lane.lockedFor) continue;
      const stats = computeLaneStats(lane);
      const SCALE = 2.5;
      let yourDelta = Math.floor(stats.youOff/SCALE) - Math.floor(stats.aiDef/SCALE);
      let aiDelta   = Math.floor(stats.aiOff/SCALE)  - Math.floor(stats.youDef/SCALE);
      lane.youCards.forEach(c => { if (c.desc === 'fieldYardBlock' && c.revealed && !c.ejected) aiDelta -= 5; });
      lane.aiCards .forEach(c => { if (c.desc === 'fieldYardBlock' && c.revealed && !c.ejected) yourDelta -= 5; });
      if (lane.modifier && lane.modifier.id === 'coinFlip') {
        const doubled = Math.random() < 0.5;
        if (doubled) { yourDelta *= 2; aiDelta *= 2; showToast(this, '🎲 COIN FLIP: DOUBLED!', 900, '#dd99ff'); }
        else { yourDelta = Math.floor(yourDelta/2); aiDelta = Math.floor(aiDelta/2); showToast(this, '🎲 COIN FLIP: HALVED!', 900, '#dd99ff'); }
        await this.delay(500);
      }
      if (yourDelta !== 0 || aiDelta !== 0) {
        lane.youPos = lane.youPos + yourDelta;
        lane.aiPos  = lane.aiPos  + aiDelta;
        this.render();
        await this.delay(this.reduced ? 200 : 500);
      }
      await this.checkScoring(lane);
    }
  }

  async checkScoring(lane) {
    if (lane.youPos >= 100) { lane.youPos = 100; this.render(); await this.delay(300); await this.scoreTouchdown('you', lane); this.resetLane(lane); this.render(); }
    if (lane.aiPos  >= 100) { lane.aiPos  = 100; this.render(); await this.delay(300); await this.scoreTouchdown('ai',  lane); this.resetLane(lane); this.render(); }
    if (lane.aiPos  <=   0) { lane.aiPos  = 0;   this.render(); await this.delay(300); await this.scoreDefense ('you', lane); this.resetLane(lane); this.render(); }
    if (lane.youPos <=   0) { lane.youPos = 0;   this.render(); await this.delay(300); await this.scoreDefense ('ai',  lane); this.resetLane(lane); this.render(); }
  }

  async scoreTouchdown(side, lane) {
    if (side === 'you') G.youScore += 6; else G.aiScore += 6;
    sfx('td');
    await this.showScoreBurst('TOUCHDOWN +6', side, true);
    const kicker = (side === 'you' ? lane.youCards : lane.aiCards).find(c => c.pos === 'K' && c.revealed && !c.ejected);
    if (kicker) {
      if (side === 'you') G.youScore += 1; else G.aiScore += 1;
      sfx('fg'); await this.showScoreBurst('PAT GOOD +1', side, false);
    }
    // 2-pt conversion (Phase 3) — only when no kicker AND OFF count > enemy DEF count
    const yourCards  = side === 'you' ? lane.youCards : lane.aiCards;
    const enemyCards = side === 'you' ? lane.aiCards  : lane.youCards;
    const yourOff = yourCards.filter(c => c.revealed && !c.ejected && c.side === 'off').length;
    const enemyDef = enemyCards.filter(c => c.revealed && !c.ejected && c.side === 'def').length;
    const canGoForTwo = yourOff > enemyDef;
    if (side === 'you' && canGoForTwo && !kicker) {
      const got2 = await ConversionScene.run(this, lane);
      if (got2) { sfx('td'); await this.showScoreBurst('2-PT CONVERSION!', 'you', true); }
    } else if (side === 'ai' && canGoForTwo && !kicker) {
      if (Math.random() < 0.5) {
        if (Math.random() < 0.5) { G.aiScore += 2; sfx('safety'); await this.showScoreBurst('CPU 2-PT!', 'ai', false); }
        else { showToast(this, 'CPU 2-PT FAILED', 1000, '#ff7a7a'); await this.delay(700); }
      }
    }
    this.render();
  }

  async scoreDefense(side, lane) {
    const myCards = side==='you' ? lane.youCards : lane.aiCards;
    const dbCount = myCards.filter(c => c.revealed && !c.ejected && (c.pos === 'CB' || c.pos === 'S')).length;
    if (dbCount >= 4) {
      if (side === 'you') G.youScore += 6; else G.aiScore += 6;
      sfx('td'); await this.showScoreBurst('PICK SIX +6', side, true);
    } else {
      if (side === 'you') G.youScore += 2; else G.aiScore += 2;
      sfx('safety'); await this.showScoreBurst('SAFETY +2', side, false);
    }
  }

  resetLane(lane) {
    lane.youCards = []; lane.aiCards = [];
    lane.youPos = kickoffPos(); lane.aiPos = kickoffPos();
  }

  // ---- Phase 8: arc animations for draw/discard ----
  async animateDiscardHand() {
    return new Promise(resolve => {
      const handCards = this.handContainer.list.slice();
      if (this.reduced || !handCards.length) {
        discardHand('you'); sfx('discard'); resolve(); return;
      }
      const dbX = this.discardBadge.x - this.handContainer.x;
      const dbY = this.discardBadge.y - this.handContainer.y;
      handCards.forEach((el, i) => {
        this.time.delayedCall(i * 40, () => {
          sfx('discard');
          this.tweens.add({ targets: el, x: dbX, y: dbY, scale: 0.3, alpha: 0, angle: 30, duration: 380, ease:'Cubic.in' });
        });
      });
      this.time.delayedCall(handCards.length * 40 + 420, () => {
        discardHand('you'); resolve();
      });
    });
  }

  async animateDrawIn() {
    if (this.reduced) return;
    const list = this.handContainer.list.slice();
    list.forEach((el, i) => {
      const baseX = el.x, baseY = el.y;
      el.x = this.deckBadge.x - this.handContainer.x;
      el.y = this.deckBadge.y - this.handContainer.y;
      el.setScale(0.3); el.setAlpha(0.35);
      this.time.delayedCall(i * 80, () => {
        sfx('draw');
        this.tweens.add({ targets: el, x: baseX, y: baseY, scale: 1, alpha: 1, duration: 380, ease:'Cubic.out' });
      });
    });
    await this.delay(list.length * 80 + 420);
  }

  showScoreBurst(text, side, big) {
    return new Promise(resolve => {
      const ringKey = side === 'you' ? 'ring_you' : 'ring_cpu';
      const ring = this.add.image(this.W/2, this.H/2, ringKey).setDepth(2999).setScale(0.3).setAlpha(0);
      this.tweens.add({ targets: ring, scale: big ? 1.4 : 1.0, alpha: 1, duration: this.reduced ? 100 : 300, ease:'Back.out' });
      const color = side==='you' ? '#4aff8a' : '#ff5a5a';
      const burst = this.add.text(this.W/2, this.H/2, text, {
        fontFamily:'Bebas Neue', fontSize: big ? '120px' : '80px',
        color, stroke:'#000', strokeThickness:10, letterSpacing:4
      }).setOrigin(0.5).setDepth(3000).setScale(0.3).setAlpha(0);
      this.tweens.add({ targets: burst, scale: 1.15, alpha: 1, duration: this.reduced ? 80 : 250, ease:'Back.out', onComplete: () => {
        this.tweens.add({ targets: burst, scale: 1, duration: 100, onComplete: () => {
          this.time.delayedCall(this.reduced ? 200 : 800, () => {
            this.tweens.add({ targets: [burst, ring], alpha: 0, y:'-=60', duration: 300, ease:'Cubic.in', onComplete: () => { burst.destroy(); ring.destroy(); resolve(); } });
          });
        }});
      }});
    });
  }

  showFloat(text, color, size = 50) {
    const t = this.add.text(this.W/2, this.H/2 - 100, text, {
      fontFamily:'Bebas Neue', fontSize: size + 'px', color, stroke:'#000', strokeThickness:6, letterSpacing:4
    }).setOrigin(0.5).setDepth(3000).setAlpha(0);
    this.tweens.add({ targets: t, alpha: 1, y: t.y - 30, duration: this.reduced ? 80 : 200, onComplete: () => {
      this.time.delayedCall(this.reduced ? 300 : 700, () => {
        this.tweens.add({ targets: t, alpha: 0, duration: 300, onComplete: () => t.destroy() });
      });
    }});
  }

  aiMakePlays() {
    let energy = G.aiEnergy;
    const playable = [...G.aiHand].sort((a, b) => (b.off + b.def) - (a.off + a.def));
    for (const card of playable) {
      if (card.cost > energy) continue;
      let bestIdx = -1, bestScore = -Infinity;
      for (let i=0;i<3;i++) {
        const lane = G.lanes[i];
        if (lane.aiCards.length >= MAX_SLOTS) continue;
        const stats = computeLaneStats(lane);
        let score = 0;
        if (card.side === 'off') {
          score = card.off;
          if (lane.aiPos >= 70) score += 18; else if (lane.aiPos >= 50) score += 8;
          if (stats.youDef < card.off / 2) score += 6;
          if (card.pos === 'K' && lane.aiPos >= 50) score += 14;
        } else {
          score = card.def;
          if (lane.youPos >= 70) score += 22; else if (lane.youPos >= 50) score += 10;
          if (lane.aiPos <= 30) score += 6;
          if ((card.pos==='CB' || card.pos==='S') && lane.aiPos <= 50) {
            const dbs = lane.aiCards.filter(c => c.pos==='CB' || c.pos==='S').length;
            score += dbs * 5;
          }
        }
        score += Math.random() * 3;
        if (score > bestScore) { bestScore = score; bestIdx = i; }
      }
      if (bestIdx >= 0) {
        const placed = { ...card, curOff: card.off, curDef: card.def, revealed:false, pending:true };
        G.lanes[bestIdx].aiCards.push(placed);
        G.pendingPlays.push({ card: placed, lane: bestIdx, side:'ai', effectiveCost: card.cost });
        G.aiHand = G.aiHand.filter(c => c.id !== card.id);
        energy -= card.cost;
      }
    }
    G.aiEnergy = energy;
  }

  endMatch() {
    G.gameOver = true;
    // Lifetime stats + rewards (Phase 6)
    const won  = G.youScore >  G.aiScore;
    const lost = G.aiScore  >  G.youScore;
    playerData.stats.totalMatches++;
    if (won) {
      playerData.stats.totalWins++;
      playerData.stats.currentWinStreak++;
      playerData.stats.longestWinStreak = Math.max(playerData.stats.longestWinStreak, playerData.stats.currentWinStreak);
      if (G.aiScore === 0) playerData.stats.shutouts++;
      if (G._wasTrailingBy14) playerData.stats.comebacks++;
    } else if (lost) {
      playerData.stats.totalLosses++;
      playerData.stats.currentWinStreak = 0;
    }
    // Season bookkeeping
    let seasonOngoing = false, championship = false;
    if (G.mode === 'season' && seasonState) {
      if (won) {
        seasonState.wins++; seasonState.week++;
        if (seasonState.wins >= 7) { championship = true; clearSeason(); }
        else { seasonOngoing = true; saveSeason(); }
      } else if (lost) { clearSeason(); }
      else { seasonOngoing = true; saveSeason(); }
    }
    const matchResult = {
      won,
      opponent: G.opponent || null,
      finalScore: { you: G.youScore, ai: G.aiScore },
      stats: { wasTrailingBy14AtHalftime: !!G._wasTrailingBy14 }
    };
    const rewards = calculateMatchRewards(matchResult);
    playerData.cash += rewards.cashEarned;
    const levelInfo = applyXpAndLevelUp(rewards.xpEarned);
    savePlayerData();
    this.scene.start('MatchSummaryScene', { matchResult, rewards, levelInfo, seasonOngoing, championship });
  }

  delay(ms) { return new Promise(r => this.time.delayedCall(ms, r)); }
}

// SCENE: CONVERSION — 2-pt coin flip modal (Phase 3)
// Static run() returns a Promise that resolves true/false.
// ============================================================
class ConversionScene extends Phaser.Scene {
  constructor() { super({ key:'ConversionScene' }); }

  static run(parent, lane) {
    return new Promise(resolve => {
      parent.scene.launch('ConversionScene', { lane, onDone: resolve });
      parent.scene.pause();
    });
  }

  init(data) { this.lane = data.lane; this.onDone = data.onDone; }

  create() {
    const W = this.scale.width, H = this.scale.height;
    this.reduced = prefersReducedMotion();
    const dim = this.add.graphics(); dim.fillStyle(0x000000, 0.85); dim.fillRect(0, 0, W, H);

    const panel = this.add.graphics();
    panel.fillStyle(0x0d1320, 0.98); panel.fillRoundedRect(W/2 - 360, H/2 - 360, 720, 720, 18);
    panel.lineStyle(4, 0xffb800, 1); panel.strokeRoundedRect(W/2 - 360, H/2 - 360, 720, 720, 18);

    this.titleTxt = this.add.text(W/2, H/2 - 300, 'TOUCHDOWN!', {
      fontFamily:'Bebas Neue', fontSize:'72px', color:'#ffb800', stroke:'#000', strokeThickness:6, letterSpacing:4
    }).setOrigin(0.5);
    this.subTxt = this.add.text(W/2, H/2 - 220, this.lane.name + ' LANE — Go for 2?', {
      fontFamily:'Oswald', fontSize:'24px', color:'#e8e8e0', letterSpacing:2
    }).setOrigin(0.5);
    this.add.text(W/2, H/2 - 180, 'You have more OFF than they have DEF here.', {
      fontFamily:'Oswald', fontSize:'18px', color:'#aaa'
    }).setOrigin(0.5);

    this.choiceLayer = this.add.container(0, 0);
    this.coinLayer = this.add.container(0, 0);
    this.coinLayer.setVisible(false);

    this.makePATBtn(W/2 - 170, H/2 + 80);
    this.makeGoBtn(W/2 + 170, H/2 + 80);
  }

  makePATBtn(x, y) {
    const btn = makeAssetButton(this, x, y, 'KICK PAT (+1)', 'btn_concede', '#fff', () => {
      sfx('fg');
      // PAT auto-good
      G.youScore += 1;
      this.finishWith(false, '+1 PAT GOOD');
    }, { w: 280, fontSize: 28 });
    this.choiceLayer.add(btn);
  }

  makeGoBtn(x, y) {
    const btn = makeAssetButton(this, x, y, 'GO FOR 2', 'btn_snap', '#fff', () => {
      sfx('click');
      this.openCoinFlip();
    }, { w: 280, fontSize: 28 });
    this.choiceLayer.add(btn);
  }

  openCoinFlip() {
    this.choiceLayer.setVisible(false);
    this.coinLayer.setVisible(true);
    const W = this.scale.width, H = this.scale.height;
    this.titleTxt.setText('CALL IT');
    this.subTxt.setText('Tap HEADS or TAILS to match the flip');

    // The coin sprite
    this.coin = this.add.image(W/2, H/2 - 30, 'coin_heads').setDisplaySize(180, 180);
    this.coinLayer.add(this.coin);

    const headsBtn = makeAssetButton(this, W/2 - 170, H/2 + 180, 'HEADS', 'btn_snap', '#fff', () => this.flip('heads'), { w: 280, fontSize: 32 });
    const tailsBtn = makeAssetButton(this, W/2 + 170, H/2 + 180, 'TAILS', 'btn_concede', '#fff', () => this.flip('tails'), { w: 280, fontSize: 32 });
    this.coinLayer.add(headsBtn); this.coinLayer.add(tailsBtn);
    this.callBtns = [headsBtn, tailsBtn];
  }

  flip(call) {
    if (this._flipping) return;
    this._flipping = true;
    this.callBtns.forEach(b => b.disableInteractive().setAlpha(0.5));
    sfx('coinFlip');
    const result = Math.random() < 0.5 ? 'heads' : 'tails';
    const dur = this.reduced ? 200 : 1400;
    // Scale-X flip: shrink to 0, swap key at midpoint, grow to 1
    const spins = this.reduced ? 1 : 5;
    let count = 0;
    const halfDur = dur / (spins * 2);
    const tick = () => {
      this.tweens.add({ targets: this.coin, scaleX: 0, duration: halfDur, ease:'Linear', onComplete: () => {
        count++;
        const useHeads = (count % 2 === 0);
        this.coin.setTexture(useHeads ? 'coin_heads' : 'coin_tails');
        this.tweens.add({ targets: this.coin, scaleX: 1, duration: halfDur, ease:'Linear', onComplete: () => {
          if (count >= spins * 2 - 1) {
            // Final state — force to result
            this.tweens.add({ targets: this.coin, scaleX: 0, duration: halfDur, ease:'Linear', onComplete: () => {
              this.coin.setTexture(result === 'heads' ? 'coin_heads' : 'coin_tails');
              this.tweens.add({ targets: this.coin, scaleX: 1, duration: halfDur, ease:'Linear', onComplete: () => this.resolveFlip(call, result) });
            }});
          } else {
            tick();
          }
        }});
      }});
    };
    // For reduced motion, skip animation
    if (this.reduced) {
      this.coin.setTexture(result === 'heads' ? 'coin_heads' : 'coin_tails');
      this.time.delayedCall(200, () => this.resolveFlip(call, result));
    } else {
      tick();
    }
  }

  resolveFlip(call, result) {
    const W = this.scale.width, H = this.scale.height;
    const matched = (call === result);
    if (matched) {
      G.youScore += 2;
      sfx('confirm');
      this.titleTxt.setText(result.toUpperCase() + ' — CONVERTED!');
      this.titleTxt.setColor('#4aff8a');
    } else {
      sfx('discard');
      this.titleTxt.setText(result.toUpperCase() + ' — NO GOOD');
      this.titleTxt.setColor('#ff5a5a');
    }
    this.time.delayedCall(this.reduced ? 400 : 1400, () => this.finishWith(matched, ''));
  }

  finishWith(scored, msg) {
    const cb = this.onDone;
    this.scene.stop();
    this.scene.resume('GameScene');
    if (cb) cb(scored);
  }
}

    const vg = this.add.graphics(); vg.fillStyle(0x000000, 0.7); vg.fillRect(0,0,W,H);
    const won = this.result.you > this.result.ai;
    const label = won ? 'VICTORY' : this.result.ai > this.result.you ? 'DEFEAT' : 'TIE GAME';
    const color = won ? '#4aff8a' : this.result.ai > this.result.you ? '#ff5a5a' : '#ffb800';
    this.add.text(W/2, H*0.32, label, { fontFamily:'Bebas Neue', fontSize:'140px', color, stroke:'#000', strokeThickness:12, letterSpacing:6 }).setOrigin(0.5);
    this.add.text(W/2, H*0.55, `YOU ${this.result.you}  —  ${this.result.ai} CPU`, { fontFamily:'Bebas Neue', fontSize:'60px', color:'#fff', stroke:'#000', strokeThickness:8, letterSpacing:6 }).setOrigin(0.5);
    makeAssetButton(this, W/2, H*0.78, 'PLAY AGAIN', 'btn_snap', '#fff', () => {
      sfx('click'); this.cameras.main.fadeOut(300);
      this.time.delayedCall(300, () => { newGame(buildQuickPlayDeck(), buildAIDeck(2), 'quick', null); this.scene.start('GameScene'); });
    });
    makeAssetButton(this, W/2, H*0.88, 'MAIN MENU', 'btn_concede', '#fff', () => {
      sfx('click'); this.cameras.main.fadeOut(300);
      this.time.delayedCall(300, () => this.scene.start('MenuScene'));
    });
  }
}

// ============================================================
// SCENE: DRAFT (Phase 4)
// 10 packs of 6 (3 OFF + 3 DEF), pick 1 OFF + 1 DEF per pack.
// 30 starter commons granted up front. Final deck: 50 cards.
// ============================================================
const PACK_PICK_SECONDS = 12;
const FINAL_PACK_PICK_SECONDS = 15;
let draftState = null;

class DraftScene extends Phaser.Scene {
  constructor() { super({ key:'DraftScene' }); }

  create() {
    this.W = this.scale.width; this.H = this.scale.height;
    this.reduced = prefersReducedMotion();
    this.cameras.main.fadeIn(400);

    const bg = this.add.image(this.W/2, this.H/2, 'stadium_bg');
    const bgTex = this.textures.get('stadium_bg').source[0];
    bg.setScale(Math.max(this.W / bgTex.width, this.H / bgTex.height)).setAlpha(0.5);
    const vg = this.add.graphics(); vg.fillStyle(0x050810, 0.7); vg.fillRect(0,0,this.W,this.H);

    draftState = {
      packNum: 1,
      totalPacks: 10,
      currentPack: [],
      pickedOff: null,
      pickedDef: null,
      roster: generateStarterDeck(),
      timeLeft: PACK_PICK_SECONDS,
      busy: false,
      autoSkipping: false
    };

    this.headerCont  = this.add.container(0, 0);
    this.packArena   = this.add.container(this.W/2, this.H * 0.45);
    this.footerCont  = this.add.container(0, 0);

    this.buildHeader();
    this.buildFooter();
    this.startPack();
  }

  buildHeader() {
    const W = this.W;
    this.headerTxt = this.add.text(W/2, 60, '', { fontFamily:'Bebas Neue', fontSize:'48px', color:'#ffb800', stroke:'#000', strokeThickness:4, letterSpacing:4 }).setOrigin(0.5);
    this.headerCont.add(this.headerTxt);
    this.subTxt = this.add.text(W/2, 105, 'Pick 1 OFFENSE and 1 DEFENSE per pack', { fontFamily:'Oswald', fontSize:'18px', color:'#aaa', letterSpacing:2 }).setOrigin(0.5);
    this.headerCont.add(this.subTxt);
    // Timer
    this.timerCircle = this.add.circle(W/2, 165, 30, 0x000000, 0.7);
    this.timerCircle.setStrokeStyle(3, 0xffb800, 0.9);
    this.timerTxt = this.add.text(W/2, 165, '12', { fontFamily:'Bebas Neue', fontSize:'34px', color:'#ffb800', stroke:'#000', strokeThickness:3 }).setOrigin(0.5);
    this.headerCont.add(this.timerCircle); this.headerCont.add(this.timerTxt);
    // Exit
    const exit = this.add.container(60, 60);
    const eBg = this.add.graphics(); eBg.fillStyle(0x331010, 0.9); eBg.fillRoundedRect(-46,-16,92,28,6); eBg.lineStyle(2,0xd62828,0.8); eBg.strokeRoundedRect(-46,-16,92,28,6);
    const eTxt = this.add.text(0,0,'◀ EXIT',{ fontFamily:'Oswald', fontSize:'15px', color:'#ff7a7a', letterSpacing:2 }).setOrigin(0.5);
    exit.add([eBg, eTxt]); exit.setSize(92,28).setInteractive({ useHandCursor:true });
    exit.on('pointerup', () => this.confirmCancel());
    this.headerCont.add(exit);
  }

  buildFooter() {
    const W = this.W, H = this.H;
    this.autoBtn = makeAssetButton(this, W/2, H - 70, '⏩ AUTO-PICK', 'btn_concede', '#fff', () => this.confirmAutoPick(), { w: 320, fontSize: 30 });
    this.footerCont.add(this.autoBtn);
    // Status text
    this.statusTxt = this.add.text(W/2, H - 130, '', { fontFamily:'Oswald', fontSize:'16px', color:'#88ddff', letterSpacing:2 }).setOrigin(0.5);
    this.footerCont.add(this.statusTxt);
  }

  confirmCancel() {
    const W = this.W, H = this.H;
    const cont = this.add.container(W/2, H/2).setDepth(9000);
    const dim = this.add.graphics(); dim.fillStyle(0x000000, 0.85); dim.fillRect(-W/2, -H/2, W, H);
    cont.add(dim); dim.setInteractive(new Phaser.Geom.Rectangle(-W/2,-H/2,W,H), Phaser.Geom.Rectangle.Contains);
    const panel = this.add.graphics();
    panel.fillStyle(0x0d1320, 0.98); panel.fillRoundedRect(-280, -160, 560, 320, 16);
    panel.lineStyle(3, 0xff5a5a, 1); panel.strokeRoundedRect(-280, -160, 560, 320, 16);
    cont.add(panel);
    cont.add(this.add.text(0, -100, 'EXIT DRAFT?', { fontFamily:'Bebas Neue', fontSize:'40px', color:'#ff5a5a', letterSpacing:3 }).setOrigin(0.5));
    cont.add(this.add.text(0, -30, 'Your picks so far will be lost.', { fontFamily:'Oswald', fontSize:'18px', color:'#e8e8e0' }).setOrigin(0.5));
    cont.add(makeAssetButton(this, -120, 90, 'STAY', 'btn_snap', '#fff', () => cont.destroy(), { w: 220, fontSize: 28 }));
    cont.add(makeAssetButton(this,  120, 90, 'EXIT', 'btn_concede', '#fff', () => {
      this.clearTimer(); draftState = null;
      this.cameras.main.fadeOut(300);
      this.time.delayedCall(300, () => this.scene.start('MenuScene'));
    }, { w: 220, fontSize: 28 }));
  }

  confirmAutoPick() {
    if (!draftState || draftState.busy) return;
    const W = this.W, H = this.H;
    const cont = this.add.container(W/2, H/2).setDepth(9000);
    const dim = this.add.graphics(); dim.fillStyle(0x000000, 0.85); dim.fillRect(-W/2, -H/2, W, H);
    cont.add(dim); dim.setInteractive(new Phaser.Geom.Rectangle(-W/2,-H/2,W,H), Phaser.Geom.Rectangle.Contains);
    const panel = this.add.graphics();
    panel.fillStyle(0x0d1320, 0.98); panel.fillRoundedRect(-280, -160, 560, 320, 16);
    panel.lineStyle(3, 0xffb800, 1); panel.strokeRoundedRect(-280, -160, 560, 320, 16);
    cont.add(panel);
    cont.add(this.add.text(0, -100, 'SKIP REMAINING?', { fontFamily:'Bebas Neue', fontSize:'40px', color:'#ffb800', letterSpacing:3 }).setOrigin(0.5));
    cont.add(this.add.text(0, -30, 'AI will pick the best card from each remaining pack.', { fontFamily:'Oswald', fontSize:'18px', color:'#e8e8e0', align:'center', wordWrap:{ width: 500 } }).setOrigin(0.5));
    cont.add(makeAssetButton(this, -120, 90, 'NO', 'btn_concede', '#fff', () => cont.destroy(), { w: 220, fontSize: 28 }));
    cont.add(makeAssetButton(this,  120, 90, 'AUTO', 'btn_snap', '#fff', () => { cont.destroy(); this.runAutoPickAll(); }, { w: 220, fontSize: 28 }));
  }

  bestAutoPick(cards) {
    if (!cards.length) return null;
    return [...cards].sort((a, b) => {
      const r = RARITY_RANK[b.rarity] - RARITY_RANK[a.rarity];
      if (r !== 0) return r;
      const aS = a.side==='off' ? a.off : a.def;
      const bS = b.side==='off' ? b.off : b.def;
      return bS - aS;
    })[0];
  }

  async runAutoPickAll() {
    draftState.busy = true;
    draftState.autoSkipping = true;
    // Honor current pack picks; fill missing.
    if (!draftState.pickedOff) draftState.pickedOff = this.bestAutoPick(draftState.currentPack.filter(c => c.side==='off'));
    if (!draftState.pickedDef) draftState.pickedDef = this.bestAutoPick(draftState.currentPack.filter(c => c.side==='def'));
    await this.finalizePack(true);
    while (draftState && draftState.packNum <= draftState.totalPacks) {
      draftState.currentPack = generateDraftPack(draftState.packNum);
      const offBest = this.bestAutoPick(draftState.currentPack.filter(c => c.side==='off'));
      const defBest = this.bestAutoPick(draftState.currentPack.filter(c => c.side==='def'));
      if (offBest && offBest.rarity === 'legendary') sfx('legendaryHit');
      else if (offBest && offBest.rarity === 'rare') sfx('rareFlash');
      if (defBest && defBest.rarity === 'legendary') sfx('legendaryHit');
      else if (defBest && defBest.rarity === 'rare') sfx('rareFlash');
      draftState.roster.push(offBest); draftState.roster.push(defBest);
      draftState.packNum++;
    }
    showToast(this, 'AUTO-PICKED REMAINING', 1400, '#ffb800');
    this.time.delayedCall(800, () => this.finishDraft());
  }

  startPack() {
    if (!draftState) return;
    draftState.busy = true;
    draftState.pickedOff = null; draftState.pickedDef = null;
    const isFinal = draftState.packNum >= draftState.totalPacks;
    draftState.timeLeft = isFinal ? FINAL_PACK_PICK_SECONDS : PACK_PICK_SECONDS;
    draftState.currentPack = generateDraftPack(draftState.packNum);
    this.updateHeader();
    if (isFinal) { sfx('finalIntro'); }
    this.renderPack(true);
    this.time.delayedCall(this.reduced ? 150 : 600, () => this.revealAllCards());
  }

  updateHeader() {
    const isFinal = draftState.packNum >= draftState.totalPacks;
    this.headerTxt.setText(isFinal ? 'FINAL PACK' : `PACK ${draftState.packNum} / ${draftState.totalPacks}`);
    this.headerTxt.setColor(isFinal ? '#ff66ff' : '#ffb800');
    this.statusTxt.setText('Deck so far: ' + draftState.roster.length + ' / 50');
  }

  renderPack(initial) {
    this.packArena.removeAll(true);
    const cardW = 130;
    const gapX = 14, gapY = 28;
    const positions = [];
    for (let row=0; row<2; row++) {
      for (let col=0; col<3; col++) {
        positions.push({ x: (col - 1) * (cardW + gapX), y: row === 0 ? -130 : 130 });
      }
    }
    // OFF labels (top)
    this.packArena.add(this.add.text(0, -240, '🟧 OFFENSE — PICK ONE', { fontFamily:'Bebas Neue', fontSize:'22px', color:'#ff8a3a', letterSpacing:3 }).setOrigin(0.5));
    this.packArena.add(this.add.text(0, 30, '🟦 DEFENSE — PICK ONE', { fontFamily:'Bebas Neue', fontSize:'22px', color:'#5acaff', letterSpacing:3 }).setOrigin(0.5));

    // Index by row: first 3 are OFF, last 3 are DEF
    const off = draftState.currentPack.filter(c => c.side==='off');
    const def = draftState.currentPack.filter(c => c.side==='def');
    const ordered = [...off, ...def];
    ordered.forEach((card, idx) => {
      const pos = positions[idx];
      const cont = this.add.container(pos.x, pos.y);
      cont.cardData = card;
      cont.startPos = { x: pos.x, y: pos.y };
      const inner = this.add.container(0, 0);
      if (initial && !card._revealed) {
        // Card back
        const back = buildCard(this, card, cardW, { hidden: true });
        inner.add(back);
      } else {
        const front = buildCard(this, card, cardW);
        inner.add(front);
      }
      cont.add(inner);
      cont.cardInner = inner;
      cont.setSize(cardW, cardW * 1.4);
      cont.setInteractive({ useHandCursor: true });
      cont.on('pointerup', () => this.tapCard(cont));
      this.packArena.add(cont);
      // Highlight picked
      this.refreshPickHighlight(cont);
    });
  }

  refreshPickHighlight(cont) {
    const card = cont.cardData;
    if (cont._halo) { cont._halo.destroy(); cont._halo = null; }
    const isPicked = (card === draftState.pickedOff || card === draftState.pickedDef);
    const sidePicked = card.side==='off' ? draftState.pickedOff : draftState.pickedDef;
    const isFaded = sidePicked && !isPicked;
    if (isPicked) {
      const halo = this.add.graphics();
      halo.lineStyle(4, 0xffb800, 1);
      halo.strokeRoundedRect(-72, -100, 144, 200, 10);
      cont.add(halo); cont._halo = halo;
      cont.setAlpha(1);
    } else if (isFaded) {
      cont.setAlpha(0.4);
    } else {
      cont.setAlpha(1);
    }
  }

  async revealAllCards() {
    if (!draftState) return;
    const items = this.packArena.list.filter(c => c.cardData);
    for (const cont of items) {
      const card = cont.cardData;
      card._revealed = true;
      // Replace back with front
      const cardW = 130;
      cont.cardInner.removeAll(true);
      const front = buildCard(this, card, cardW);
      cont.cardInner.add(front);
      // Flash for rare/legendary
      if (card.rarity === 'rare') { sfx('rareFlash'); this.flashCard(cont, 0xffaa44, 600); }
      else if (card.rarity === 'legendary') {
        sfx('legendaryHit');
        this.flashCard(cont, 0xffd54d, 900);
        if (!this.reduced) this.cameras.main.shake(220, 0.008);
      } else {
        sfx('flip');
      }
      await new Promise(r => this.time.delayedCall(this.reduced ? 80 : 250, r));
      if (!draftState) return;
    }
    draftState.busy = false;
    this.startPackTimer();
  }

  flashCard(cont, color, dur) {
    const g = this.add.graphics();
    g.fillStyle(color, 0.5); g.fillRoundedRect(-75, -105, 150, 210, 12);
    cont.add(g);
    this.tweens.add({ targets: g, alpha: 0, duration: dur, onComplete: () => g.destroy() });
  }

  tapCard(cont) {
    if (!draftState || draftState.busy) return;
    const card = cont.cardData;
    if (!card._revealed) return;
    if (card === draftState.pickedOff || card === draftState.pickedDef) return;
    if (card.side==='off') draftState.pickedOff = card;
    else                    draftState.pickedDef = card;
    sfx('pick');
    // refresh all
    this.packArena.list.filter(c => c.cardData).forEach(c => this.refreshPickHighlight(c));
    if (draftState.pickedOff && draftState.pickedDef) {
      this.clearTimer();
      this.time.delayedCall(600, () => this.finalizePack(false));
    }
  }

  startPackTimer() {
    this.clearTimer();
    const refresh = () => {
      if (!draftState) return;
      this.timerTxt.setText(Math.max(0, draftState.timeLeft));
      const ttl = draftState.timeLeft;
      if (ttl <= 2) this.timerTxt.setColor('#ff5a5a');
      else if (ttl <= 4) this.timerTxt.setColor('#ffaa44');
      else this.timerTxt.setColor('#ffb800');
    };
    refresh();
    this.tickEvent = this.time.addEvent({
      delay: 1000, loop: true, callback: () => {
        if (!draftState || draftState.busy) return;
        draftState.timeLeft--;
        if (draftState.timeLeft <= 4 && draftState.timeLeft > 1) sfx('tick');
        else if (draftState.timeLeft === 1) sfx('tickUrgent');
        refresh();
        if (draftState.timeLeft <= 0) {
          this.clearTimer();
          this.autoPickCurrent();
        }
      }
    });
  }

  clearTimer() {
    if (this.tickEvent) { this.tickEvent.remove(false); this.tickEvent = null; }
  }

  async autoPickCurrent() {
    if (!draftState || draftState.busy) return;
    draftState.busy = true;
    if (!draftState.pickedOff) draftState.pickedOff = this.bestAutoPick(draftState.currentPack.filter(c => c.side==='off'));
    if (!draftState.pickedDef) draftState.pickedDef = this.bestAutoPick(draftState.currentPack.filter(c => c.side==='def'));
    this.packArena.list.filter(c => c.cardData).forEach(c => this.refreshPickHighlight(c));
    showToast(this, 'AUTO-PICKED', 900, '#ffb800');
    this.time.delayedCall(600, () => this.finalizePack(true));
  }

  async finalizePack(fromAuto) {
    if (!draftState) return;
    draftState.busy = true;
    this.clearTimer();
    sfx('discard');
    if (!fromAuto) sfx('confirm');
    // Animate picks toward header (deck), others fade
    const items = this.packArena.list.filter(c => c.cardData);
    items.forEach((cont) => {
      const card = cont.cardData;
      if (card === draftState.pickedOff || card === draftState.pickedDef) {
        this.tweens.add({ targets: cont, y: cont.y - 400, alpha: 0, scale: 0.4, duration: 400, ease:'Cubic.in' });
      } else {
        this.tweens.add({ targets: cont, y: cont.y + 60, alpha: 0, duration: 360, ease:'Cubic.in' });
      }
    });
    await new Promise(r => this.time.delayedCall(440, r));
    if (!draftState) return;
    if (draftState.pickedOff) draftState.roster.push(draftState.pickedOff);
    if (draftState.pickedDef) draftState.roster.push(draftState.pickedDef);
    draftState.pickedOff = null; draftState.pickedDef = null;
    draftState.packNum++;
    if (draftState.packNum > draftState.totalPacks) { this.finishDraft(); return; }
    if (!draftState.autoSkipping) {
      this.startPack();
    }
  }

  finishDraft() {
    this.clearTimer();
    seasonState = { roster: draftState.roster, wins: 0, week: 1 };
    saveSeason();
    draftState = null;
    this.cameras.main.fadeOut(400);
    this.time.delayedCall(400, () => this.scene.start('SeasonHubScene'));
  }
}

// ============================================================
// SCENE: SEASON HUB (Phase 5)
// ============================================================
class SeasonHubScene extends Phaser.Scene {
  constructor() { super({ key:'SeasonHubScene' }); }
  create() {
    const W = this.scale.width, H = this.scale.height;
    this.cameras.main.fadeIn(400);
    if (!seasonState) seasonState = loadSeason();
    if (!seasonState) { this.scene.start('MenuScene'); return; }

    const bg = this.add.image(W/2, H/2, 'stadium_bg');
    const bgTex = this.textures.get('stadium_bg').source[0];
    bg.setScale(Math.max(W / bgTex.width, H / bgTex.height)).setAlpha(0.5);
    const vg = this.add.graphics(); vg.fillStyle(0x000000, 0.7); vg.fillRect(0,0,W,H);

    this.add.text(W/2, 70, 'SEASON', { fontFamily:'Bebas Neue', fontSize:'72px', color:'#ffb800', stroke:'#000', strokeThickness:6, letterSpacing:8 }).setOrigin(0.5);

    for (let i=0;i<7;i++) {
